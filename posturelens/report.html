<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>External Security Posture Report · Owlglass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a1a;--muted:#5a5a5a;--rule:#d4d4d4;--accent:#d4a64a;--crit:#c0392b;--high:#d97706;--med:#d4a64a;--low:#2563eb;--info:#6b7280;--ok:#16a34a}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f0f0f0;color:var(--ink);font-family:'Fraunces',Georgia,serif;font-size:10.5pt;line-height:1.5}
.banner{background:#1a1a1a;color:#fff;padding:14px 20px;font-family:'Inter',sans-serif;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:14px}
.banner button{background:var(--accent);color:#1a1a1a;border:none;padding:8px 14px;font-weight:600;font-size:13px;cursor:pointer;border-radius:4px;font-family:inherit}
.banner-input{display:flex;gap:8px;align-items:center}
.banner input{font-family:'Inter',sans-serif;font-size:12px;padding:6px 10px;border:1px solid #555;background:#2a2a2a;color:#fff;border-radius:3px;width:240px}
.page{max-width:170mm;margin:20px auto;background:#fff;padding:22mm 25mm;box-shadow:0 4px 20px rgba(0,0,0,.1);min-height:240mm}
h1,h2,h3,h4{font-family:'Inter',sans-serif;color:#1a1a1a;font-weight:600;line-height:1.25}
h1{font-size:22pt;margin-bottom:12pt}
h2{font-size:14pt;margin:24pt 0 10pt;padding-bottom:6pt;border-bottom:1px solid var(--accent)}
h3{font-size:11pt;font-weight:600;margin:14pt 0 6pt}
h4{font-size:10pt;font-weight:600;margin:10pt 0 4pt}
p{margin-bottom:8pt}
strong{font-weight:600}
.mono{font-family:'JetBrains Mono',monospace;font-size:9.5pt}
.muted{color:var(--muted)}
.cover{display:flex;flex-direction:column;justify-content:space-between;min-height:240mm;padding:20mm 25mm}
.cover-top{font-family:'Inter',sans-serif;color:var(--accent);font-weight:600;letter-spacing:.08em;font-size:11pt}
.cover-mid{text-align:center}
.cover-domain{font-family:'Inter',sans-serif;font-size:32pt;font-weight:700;letter-spacing:-.01em;margin-bottom:14pt;word-break:break-all}
.cover-title{font-size:16pt;color:var(--muted);font-style:italic}
.cover-prepared{margin-top:24pt;font-family:'Inter',sans-serif;font-size:11pt;color:var(--ink)}
.cover-prepared .label{font-size:9pt;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4pt}
.cover-bottom{font-family:'Inter',sans-serif;font-size:9pt;color:var(--muted);display:flex;justify-content:space-between}

.exec-grid{display:grid;grid-template-columns:auto 1fr;gap:30pt;align-items:start;margin:18pt 0 24pt}
.exec-grade{font-family:'Inter',sans-serif;font-size:84pt;font-weight:700;line-height:.9;color:#1a1a1a;letter-spacing:-.04em}
.exec-grade-label{font-family:'Inter',sans-serif;font-size:9pt;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4pt}
.exec-grade-num{font-family:'Inter',sans-serif;font-size:11pt;color:var(--muted);margin-top:6pt}
.subbar{display:flex;align-items:center;gap:10pt;margin-bottom:6pt;font-family:'Inter',sans-serif;font-size:10pt}
.subbar .name{flex:0 0 110pt;font-weight:500}
.subbar .track{flex:1;height:6pt;background:#e8e8e8;border-radius:3pt;overflow:hidden}
.subbar .fill{height:100%;border-radius:3pt}
.subbar .num{flex:0 0 50pt;text-align:right;font-family:'JetBrains Mono',monospace;font-size:9pt;color:var(--muted)}

.finding{border:1px solid var(--rule);border-left:3pt solid var(--rule);padding:12pt 14pt;margin:10pt 0;page-break-inside:avoid;break-inside:avoid}
.finding.critical{border-left-color:var(--crit)}
.finding.high{border-left-color:var(--high)}
.finding.medium{border-left-color:var(--med)}
.finding.low{border-left-color:var(--low)}
.finding.informational{border-left-color:var(--info)}
.finding-head{display:flex;justify-content:space-between;align-items:start;gap:14pt;margin-bottom:8pt}
.finding-headline{font-family:'Inter',sans-serif;font-size:11pt;font-weight:600;flex:1}
.finding-sev{font-family:'Inter',sans-serif;font-size:8pt;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3pt 7pt;border-radius:3pt;color:#fff;white-space:nowrap;align-self:flex-start}
.finding-sev.critical{background:var(--crit)}.finding-sev.high{background:var(--high)}.finding-sev.medium{background:var(--med);color:#1a1a1a}.finding-sev.low{background:var(--low)}.finding-sev.informational{background:var(--info)}
.finding-id{font-family:'JetBrains Mono',monospace;font-size:8pt;color:var(--muted);margin-left:8pt}
.finding-section{margin-top:6pt}
.finding-section .label{font-family:'Inter',sans-serif;font-size:8.5pt;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3pt;font-weight:600}
.finding-section .body{font-size:10pt;line-height:1.5}
.finding-tech{background:#f7f5f0;padding:8pt 10pt;border-radius:3pt;font-family:'JetBrains Mono',monospace;font-size:9pt;line-height:1.4;word-break:break-all;color:#1a1a1a;margin-top:3pt}
.finding-action{font-family:'Inter',sans-serif;font-size:10pt;font-weight:500;color:#1a1a1a;margin-top:8pt;padding-top:6pt;border-top:1px solid var(--rule)}

.strength{border:1px solid #16a34a44;background:#16a34a08;padding:12pt 14pt;border-radius:3pt;margin:10pt 0}
.strength-head{font-family:'Inter',sans-serif;font-weight:600;color:var(--ok);font-size:11pt;margin-bottom:6pt}

table.checks{width:100%;border-collapse:collapse;margin:10pt 0;font-family:'Inter',sans-serif;font-size:9.5pt}
table.checks th,table.checks td{padding:6pt 8pt;text-align:left;border-bottom:1px solid var(--rule)}
table.checks th{font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-size:8.5pt}
.pass{color:var(--ok);font-weight:600}.fail{color:var(--crit);font-weight:600}.warn{color:var(--high);font-weight:600}.na{color:var(--muted)}

.method-list{font-size:10pt;line-height:1.6}
.method-list li{margin-bottom:6pt;list-style:disc;margin-left:18pt}

.appendix-block{margin-bottom:14pt}
.appendix-block .label{font-family:'Inter',sans-serif;font-size:9pt;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4pt}
.appendix-block pre{background:#f7f5f0;padding:8pt 10pt;font-family:'JetBrains Mono',monospace;font-size:8.5pt;line-height:1.4;border-radius:3pt;white-space:pre-wrap;word-break:break-all;max-height:none}

.error{padding:30pt;text-align:center;color:var(--muted)}

@media print{
  @page{size:A4;margin:18mm 20mm 18mm 20mm}
  body{background:#fff}
  .banner{display:none}
  .page{box-shadow:none;margin:0;padding:0;max-width:none;min-height:0}
  .cover{padding:0;min-height:auto;page-break-after:always}
  h2{page-break-before:auto}
  h2.pgbreak{page-break-before:always}
  .finding{page-break-inside:avoid}
  body::after{display:none}
}
</style>
</head>
<body>

<div class="banner" id="banner">
  <div>📄 <strong>External Security Posture Report</strong> — Press <kbd>Ctrl+P</kbd> (or <kbd>⌘+P</kbd>) and choose "Save as PDF" as the destination.</div>
  <div class="banner-input">
    <input id="prep-input" type="text" placeholder="Prepared for (optional)" autocomplete="off">
    <button onclick="window.print()">Print / Save as PDF</button>
  </div>
</div>

<div id="report-root"></div>

<script>
'use strict';

// ===== Templates (full prose, dual-register) =====
const TEMPLATES = {
'EA-01':{cat:'email',sev:'critical',headline:'No DMARC record published',
  why:'DMARC tells receiving mail servers what to do with messages that fail authentication checks. Without a published DMARC record, this domain has no policy declared, and recipient servers will accept and deliver mail that claims to be from this domain even when it is not. This is the most common technical enabler of impersonation and invoice fraud, because attackers do not need to compromise anything — they simply send mail using the domain name in the From field.',
  tech:'No TXT record found at _dmarc.<domain>. Recipient mail servers fall back to default behaviour, which for most providers means delivering unauthenticated mail rather than rejecting it.',
  action:'Publish a DMARC record at _dmarc.<domain>. Begin with a monitoring policy of v=DMARC1; p=none; rua=mailto:reports@<domain>; to collect data, then move to p=quarantine and finally p=reject once aligned mail flows are confirmed.'},

'EA-02':{cat:'email',sev:'high',headline:'DMARC policy is set to monitor only (p=none)',
  why:'A monitor-only DMARC policy collects information about who is sending mail using this domain but does not instruct receivers to block unauthenticated messages. The domain remains spoofable while in this state. Monitor mode is appropriate for the first 30 to 90 days of DMARC deployment, but leaving a domain at p=none indefinitely provides no protection.',
  tech:'DMARC record present with p=none. Receivers continue to deliver unauthenticated mail; only reporting is enabled.',
  action:'After reviewing aggregate reports and confirming that legitimate mail flows are aligned, transition to p=quarantine, then to p=reject. A reasonable timeline is 30 days at p=none, 30 days at p=quarantine, then p=reject.'},

'EA-03':{cat:'email',sev:'medium',headline:'DMARC policy is set to quarantine rather than reject',
  why:'A quarantine policy instructs receivers to treat unauthenticated mail with suspicion, typically by routing it to spam or junk folders. This is meaningfully better than no protection, but quarantined mail can still reach recipients who actively check their spam folder, and some receivers handle quarantine inconsistently. The strongest and recommended posture is p=reject.',
  tech:'DMARC record present with p=quarantine.',
  action:'Once aggregate reports confirm no legitimate mail is being miscategorised, change the policy tag from p=quarantine to p=reject.'},

'EA-04':{cat:'email',sev:'medium',headline:'DMARC subdomain policy is weaker than the primary policy',
  why:'When the primary DMARC policy is set to reject but no equivalent subdomain policy is declared, attackers can spoof messages from unused subdomains of this domain (such as marketing.<domain> or invoicing.<domain>) without restriction. The subdomain policy tag closes this gap.',
  tech:'DMARC record has p=reject but sp= is missing or weaker than the parent policy.',
  action:'Add sp=reject to the DMARC record so that all subdomains inherit the same enforcement posture.'},

'EA-05':{cat:'email',sev:'high',headline:'No SPF record published',
  why:'SPF declares which mail servers are authorised to send mail on behalf of this domain. Without an SPF record, receiving servers have no way to verify whether a message claiming to be from this domain originated from an approved source. SPF works alongside DMARC to provide layered authentication.',
  tech:'No TXT record beginning with v=spf1 was found at the apex domain.',
  action:'Publish an SPF record listing all systems that legitimately send mail for this domain (for example, Microsoft 365, Google Workspace, marketing platforms). A typical record begins with v=spf1 and ends in -all to fail unauthorised senders.'},

'EA-06':{cat:'email',sev:'high',headline:'SPF policy is overly permissive',
  why:'An SPF record ending in +all explicitly authorises any sender on the internet to send mail using this domain, which is the opposite of what SPF is meant to do. A record ending in ?all is neutral and effectively the same as having no policy. Both configurations defeat the purpose of SPF.',
  tech:'SPF record ends with +all or ?all rather than -all (hard fail) or ~all (soft fail).',
  action:'Replace the terminating mechanism with -all once the list of authorised senders is complete and verified, or use ~all during a transition period while monitoring for unintended failures.'},

'EA-07':{cat:'email',sev:'high',headline:'SPF record exceeds the 10-lookup limit',
  why:'The SPF specification limits the number of DNS lookups required to evaluate a record to ten. When this limit is exceeded, receiving servers return a permanent error and treat SPF evaluation as if no record existed. This is a silent failure: the record looks fine but provides no protection. It typically happens when many third-party services are added via include mechanisms.',
  tech:'SPF record contains more than 10 mechanisms that trigger DNS lookups (include, a, mx, ptr, exists, redirect).',
  action:'Consolidate or remove unused includes. Tools such as SPF flatteners can pre-resolve includes into IP ranges, but require automated maintenance because the underlying providers change their IP space frequently.'},

'EA-08':{cat:'email',sev:'low',headline:'No DKIM signing keys found at common selectors',
  why:'DKIM cryptographically signs outbound mail, allowing receiving servers to verify that messages have not been altered in transit and originated from an authorised system. Because there is no DNS-based way to enumerate which DKIM selectors a domain uses, this check probes a list of common selector names. None of them resolved, which suggests DKIM may not be configured — though it is possible the domain uses non-standard selector names that this check cannot discover.',
  tech:'No TXT records found at common DKIM selectors including default._domainkey, google._domainkey, selector1._domainkey, selector2._domainkey, k1._domainkey, mail._domainkey, dkim._domainkey.',
  action:'Confirm DKIM is configured for all systems that send mail. If using Microsoft 365 or Google Workspace, ensure DKIM signing is enabled in the admin console. Verify the published selector names match those configured in the sending platform.'},

'EA-09':{cat:'email',sev:'informational',headline:'No MX records and no null-MX policy declared',
  why:'When a domain does not receive mail, RFC 7505 recommends publishing a null-MX record (MX 0 .) to explicitly signal this fact. Without it, mail servers attempting to send to this domain will retry repeatedly before giving up, and attackers may abuse the ambiguity to make spoofed mail appear more plausible.',
  tech:'No MX records found and no null-MX (MX 0 .) record declared.',
  action:'If this domain is not used for receiving mail, publish MX 0 . at the apex to signal explicit refusal.'},

'EA-10':{cat:'email',sev:'low',headline:'No MTA-STS policy published',
  why:'MTA-STS protects inbound mail from being downgraded to unencrypted transport by an attacker positioned between the sender and the receiving mail server. Without it, an active network attacker can in some scenarios force mail to be delivered without TLS protection. MTA-STS is increasingly considered baseline for organisations that take email security seriously.',
  tech:'No TXT record found at _mta-sts.<domain>, and no policy file at https://mta-sts.<domain>/.well-known/mta-sts.txt.',
  action:'Publish an MTA-STS policy in enforce mode after testing in testing mode for 30 days. Pair with TLS-RPT for visibility into delivery failures.'},

'EA-11':{cat:'email',sev:'informational',headline:'No TLS-RPT reporting configured',
  why:'TLS-RPT provides aggregated reports about TLS connection failures during mail delivery, giving operational visibility into MTA-STS enforcement and STARTTLS issues. It does not block any traffic but is essential for diagnosing email transport problems.',
  tech:'No TXT record found at _smtp._tls.<domain>.',
  action:'Publish a TLS-RPT record (v=TLSRPTv1; rua=mailto:tlsrpt@<domain>) to receive daily aggregate reports.'},

'AS-01':{cat:'surface',sev:'high',headline:'Subdomains with sensitive naming patterns are exposed',
  why:'Subdomains with names suggesting administrative interfaces, internal tools, or development environments are disproportionately targeted by attackers because they often expose services that were not designed to be accessible from the public internet. These names appear in public certificate transparency logs and are easily discovered by anyone scanning for them.',
  tech:'Certificate transparency logs reveal subdomains containing terms such as admin, vpn, jenkins, gitlab, phpmyadmin, staging, dev, test, internal, backup, confluence, or jira.',
  action:'Audit each flagged subdomain to confirm whether public exposure is intentional. Move administrative interfaces behind a VPN, identity-aware proxy, or IP allowlist. Decommission any host that should not be reachable from the public internet.'},

'AS-02':{cat:'surface',sev:'medium',headline:'Subdomains with neglect-pattern names are present',
  why:'Subdomains with names such as old, legacy, deprecated, archive, or tmp typically indicate hosts that are no longer actively maintained. Forgotten infrastructure is one of the most common entry points in modern breaches because patching and monitoring lapse over time. The host may also be running outdated software with known vulnerabilities.',
  tech:'Certificate transparency logs reveal subdomains containing terms such as old, legacy, deprecated, archive, or tmp.',
  action:'Verify each host is intentionally still in service. Decommission any host that is no longer needed and remove its DNS record. For hosts that must remain, confirm patching, logging, and monitoring are active.'},

'AS-03':{cat:'surface',sev:'medium',headline:'Elevated rate of new subdomains in the last 90 days',
  why:'A high proportion of newly issued certificates relative to the domain\'s historical rate may indicate decentralised certificate procurement, shadow IT, or a recent change in infrastructure that has not been formally documented. Each new subdomain is a new potential entry point that must be inventoried and secured.',
  tech:'More than 40% of all certificates observed for this domain were issued in the last 90 days.',
  action:'Review the recently issued certificates against the certificate transparency logs. Confirm each new subdomain corresponds to an authorised project. Establish a centralised process for subdomain creation if one does not exist.'},

'AS-05':{cat:'surface',sev:'medium',headline:'Hosts with expired certificates are still resolving',
  why:'When a host has a certificate that has expired but the DNS record still resolves, this typically indicates forgotten infrastructure. These hosts often run outdated software and represent a higher-than-average risk of compromise. They are also frequent targets for subdomain takeover when pointed at deprovisioned third-party services.',
  tech:'Subdomain has an expired certificate as its most recent issuance and still has an A or AAAA record in DNS.',
  action:'Confirm whether the host is still in use. If yes, renew the certificate and verify monitoring. If no, remove the DNS record.'},

'AS-06':{cat:'surface',sev:'low',headline:'Certificates issued by an unusually diverse set of CAs',
  why:'A large number of distinct certificate authorities issuing certificates for the same domain typically indicates that certificate procurement is decentralised across teams without coordination. While not a vulnerability in itself, it correlates with weaker certificate management and increases the risk of expirations or rogue issuance going undetected.',
  tech:'More than four distinct certificate authority issuers identified across the domain\'s certificates.',
  action:'Centralise certificate procurement under one or two trusted CAs. Implement automated renewal where possible. Publish CAA records to restrict which CAs may issue certificates for this domain.'},

'AS-07':{cat:'surface',sev:'informational',headline:'Wildcard certificates in use',
  why:'Wildcard certificates cover all subdomains of a given level (for example, *.example.com covers any.example.com). They simplify certificate management but expand the blast radius if the private key is compromised, because the same key signs every subdomain. Their use is widespread and often appropriate.',
  tech:'One or more certificates with wildcard subjectAlternativeNames (e.g. *.<domain>) are present.',
  action:'No action required if wildcards are used intentionally. Confirm the private keys are stored in hardware security modules or equivalent protected storage and rotated regularly.'},

'AS-08':{cat:'surface',sev:'critical',headline:'Subdomain CNAME points at a deprovisioned third-party service',
  why:'When a subdomain has a CNAME record pointing at a third-party service (such as a SaaS platform, hosting provider, or static site service) and that service no longer recognises the target, an attacker may be able to register the same identifier on the third-party platform and gain full control of content served at this subdomain. This class of attack — subdomain takeover — has been used to bypass authentication, host phishing, and steal cookies in many real-world breaches.',
  tech:'CNAME record points at a known-takeoverable service pattern, and the target does not currently resolve to any IP address.',
  action:'Remove the dangling CNAME record from DNS immediately. Audit all subdomains pointing at third-party services and confirm each integration is currently active. Implement a DNS hygiene process that removes records when services are decommissioned.'},

'DNS-01':{cat:'dns',sev:'low',headline:'DNSSEC is not enabled',
  why:'DNSSEC adds cryptographic signatures to DNS responses, allowing resolvers to detect tampering between the authoritative server and the client. It is a hygiene signal — well-run domains often deploy it — but it does not prevent the DNS-related attacks most commonly seen in breaches today, which involve subdomain takeover and misconfigured cloud services rather than DNS spoofing.',
  tech:'No DS record found at the parent zone, or DoH responses do not return the AD (authenticated data) flag.',
  action:'Consider deploying DNSSEC after evaluating operational readiness. Misconfigured DNSSEC has caused major outages, so deployment should be planned carefully and tested in non-production zones first.'},

'DNS-02':{cat:'dns',sev:'low',headline:'No CAA records published',
  why:'CAA records restrict which certificate authorities are authorised to issue certificates for this domain. Without them, any CA may legitimately issue a certificate, increasing the risk of fraudulent issuance via social engineering or compromised registration processes. CAA does not prevent all certificate misissuance but raises the bar.',
  tech:'No CAA records found at the apex domain.',
  action:'Publish CAA records listing only the CAs your organisation actually uses (for example, 0 issue "letsencrypt.org" and 0 issue "digicert.com"). Add a 0 iodef "mailto:..." entry to receive notifications of attempted unauthorised issuance.'},

'DNS-03':{cat:'dns',sev:'low',headline:'All nameservers belong to a single provider',
  why:'When all authoritative nameservers belong to a single provider, an outage at that provider takes the domain offline entirely. This is more an availability concern than a security one, but several major incidents have caused multi-hour internet outages because of single-provider DNS dependencies.',
  tech:'All NS records resolve to nameservers under the same parent domain (single provider).',
  action:'Consider adding a secondary nameserver provider to improve availability. Most enterprise DNS providers support hidden primary configurations that make this straightforward.'},

'DNS-04':{cat:'dns',sev:'informational',headline:'SOA refresh or expire values are out of recommended range',
  why:'The SOA record controls how secondary nameservers update their copies of the zone. Values significantly outside recommended ranges may indicate a manual misconfiguration that could affect propagation or zone transfer behaviour.',
  tech:'SOA refresh outside 3600–86400 seconds or expire outside 1209600–2419200 seconds.',
  action:'Review the SOA values against the operational requirements of the secondary nameservers, if any. Most providers ship with sensible defaults.'},

'WEB-01':{cat:'web',sev:'high',headline:'HTTPS responds with an invalid certificate',
  why:'A domain that responds to HTTPS with an invalid, expired, or mismatched certificate signals a serious operational issue. Browsers will warn or block users entirely, and any traffic that does reach the server cannot be considered protected from tampering or interception.',
  tech:'HTTPS connection to the apex domain fails certificate validation.',
  action:'Replace or renew the certificate immediately. Verify that the certificate chain is complete and that the certificate covers the apex domain.'},

'WEB-02':{cat:'web',sev:'medium',headline:'HTTP does not redirect to HTTPS',
  why:'When a user types the domain without specifying a scheme, browsers may attempt HTTP first. If the server does not redirect to HTTPS, the initial request is sent in cleartext and is vulnerable to interception. Modern browsers increasingly enforce HTTPS by default, but the server-side configuration should still be correct.',
  tech:'HTTP request to the apex domain returns content directly without a 301 or 308 redirect to HTTPS.',
  action:'Configure the web server to redirect all HTTP requests to HTTPS using a 301 (permanent) redirect.'},

'WEB-03':{cat:'web',sev:'medium',headline:'Domain is not in the Chromium HSTS preload list',
  why:'The HSTS preload list is a hardcoded list shipped with major browsers that forces HTTPS for listed domains regardless of any prior visit. Domains in the preload list are protected from the trust-on-first-use window where an attacker could downgrade the initial connection. Domains not in the list may still configure HSTS via response headers, which this check cannot read.',
  tech:'Domain not present in the bundled Chromium HSTS preload list. Note: HSTS may still be configured via response headers, which is not detectable from the browser.',
  action:'After confirming all subdomains are HTTPS-only, submit the domain to https://hstspreload.org. Preload submission is irreversible without a multi-month removal process, so verify thoroughly first.'},

'WEB-04':{cat:'web',sev:'low',headline:'TLS reachable but with browser-detectable warnings',
  why:'The TLS handshake with this domain succeeded but with patterns suggesting weaker-than-expected configuration. Browser-only checks have limited visibility into TLS quality. For a complete TLS assessment, run the SSL Labs deep scan available from the dashboard.',
  tech:'TLS handshake completed but with indicators consistent with older protocol or cipher configurations.',
  action:'Run the SSL Labs deep scan and aim for an A or A+ grade. Disable TLS 1.0 and 1.1, prioritise modern cipher suites, and ensure HSTS is configured.'},

'WEB-05':{cat:'web',sev:'high',headline:'Apex domain may have open-redirect parameters',
  why:'An open redirect on the apex domain allows an attacker to construct URLs that begin with the legitimate domain but redirect users to attacker-controlled sites. These URLs are widely abused in phishing because users and security tools both treat the legitimate domain as trustworthy. This finding is a heuristic and should be verified manually.',
  tech:'Common redirect parameter patterns detected; manual verification required from the browser.',
  action:'Audit any redirect functionality on the apex domain. Restrict redirect targets to a strict allowlist of approved internal paths or fully-qualified URLs. Avoid passing arbitrary URLs in query parameters.'}
};

// ===== Load and render =====
const params = new URLSearchParams(location.search);
const domain = params.get('domain');
const root = document.getElementById('report-root');

if (!domain){
  root.innerHTML = '<div class="page error"><h1>No domain specified</h1><p>This report page is opened from the PostureLens dashboard. <a href="/posturelens/">Return to PostureLens</a>.</p></div>';
} else {
  let state = null;
  try { state = JSON.parse(localStorage.getItem('owlglass.posturelens.v2')); } catch(e){}
  const data = state && state.domains && state.domains[domain] && state.domains[domain].latest;
  if (!data){
    root.innerHTML = `<div class="page error"><h1>No scan data found</h1><p>No scan data is available for <strong>${escapeHtml(domain)}</strong> in this browser. Run a scan from the <a href="/posturelens/">PostureLens dashboard</a> first.</p></div>`;
  } else {
    renderReport(domain, data, state.domains[domain].deepScanResult);
  }
}

// Restore prepared-for value
const prepKey = 'owlglass.report.preparedFor.' + (domain||'');
const prepInput = document.getElementById('prep-input');
if (prepInput){
  prepInput.value = localStorage.getItem(prepKey) || '';
  prepInput.addEventListener('input', () => {
    localStorage.setItem(prepKey, prepInput.value);
    const el = document.getElementById('cover-prep');
    if (el) el.textContent = prepInput.value || '';
    const wrap = document.getElementById('cover-prep-wrap');
    if (wrap) wrap.style.display = prepInput.value ? 'block' : 'none';
  });
}

function renderReport(domain, r, deep){
  const date = new Date(r.scannedAt).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
  const allFindings = [
    ...r.subscores.email.findings,
    ...r.subscores.surface.findings,
    ...r.subscores.dns.findings,
    ...r.subscores.web.findings,
    ...((deep && deep.findings) ? deep.findings : [])
  ];
  const sevOrder = {critical:0,high:1,medium:2,low:3,informational:4};
  const sortedFindings = [...allFindings].sort((a,b) => sevOrder[a.sev] - sevOrder[b.sev]);
  const top3 = topActions(sortedFindings).slice(0,3);
  const prepFor = localStorage.getItem(prepKey) || '';

  root.innerHTML = `
${coverPage(domain, date, prepFor)}
${execSummary(domain, r, sortedFindings, top3)}
${findingsSection(sortedFindings)}
${subscoreBreakdown(r)}
${methodologySection(r)}
${appendixSection(domain, r)}
`;
}

function coverPage(domain, date, prepFor){
  return `<div class="page cover">
    <div class="cover-top">OWLGLASS · POSTURELENS</div>
    <div class="cover-mid">
      <div class="cover-domain">${escapeHtml(domain)}</div>
      <div class="cover-title">External Security Posture Report</div>
      <div class="cover-prepared" id="cover-prep-wrap" style="display:${prepFor?'block':'none'}">
        <div class="label">Prepared for</div>
        <div id="cover-prep">${escapeHtml(prepFor)}</div>
      </div>
    </div>
    <div class="cover-bottom">
      <div>Generated ${date}</div>
      <div>owlglass.pages.dev</div>
    </div>
  </div>`;
}

function execSummary(domain, r, findings, top3){
  const counts = {critical:0,high:0,medium:0,low:0,informational:0};
  findings.forEach(f => counts[f.sev]++);
  const cMatPara = materialFindingsParagraph(counts, r);
  const aPara = `This report assesses the external security posture of <strong>${escapeHtml(domain)}</strong> based on publicly observable signals: DNS records, certificate transparency logs, and unauthenticated HTTPS probes. Four sub-scores combine into an overall grade weighted as Email Authentication 35%, Attack Surface 30%, DNS Hygiene 20%, and Web Security 15%. The overall grade is capped at one level above the lowest sub-score to ensure a strong category cannot mask a weak one.`;
  const actionPara = top3.length ? `The three most impactful actions, in priority order: ${top3.map((f,i)=>`(${i+1}) ${TEMPLATES[f.id]?.headline.toLowerCase()}`).join('; ')}.` : `No prioritised remediation actions are required at this time. Continue monitoring for changes via periodic rescans.`;

  return `<div class="page">
    <h1>Executive Summary</h1>
    <div class="exec-grid">
      <div>
        <div class="exec-grade-label">Overall grade</div>
        <div class="exec-grade">${r.grade}</div>
        <div class="exec-grade-num">${r.overall} / 100</div>
      </div>
      <div>
        ${subbar('Email Authentication', r.subscores.email.score, '#d97706')}
        ${subbar('Attack Surface', r.subscores.surface.score, '#2563eb')}
        ${subbar('DNS Hygiene', r.subscores.dns.score, '#16a34a')}
        ${subbar('Web Security', r.subscores.web.score, '#d4a64a')}
      </div>
    </div>
    <h3>Assessment</h3>
    <p>${aPara}</p>
    <h3>Material findings</h3>
    <p>${cMatPara}</p>
    <h3>Recommended actions</h3>
    <p>${actionPara}</p>
  </div>`;
}

function subbar(name, score, color){
  return `<div class="subbar">
    <span class="name">${name}</span>
    <span class="track"><span class="fill" style="width:${score}%;background:${color}"></span></span>
    <span class="num">${score}/100</span>
  </div>`;
}

function materialFindingsParagraph(counts, r){
  const parts = [];
  if (counts.critical) parts.push(`<strong>${counts.critical} critical</strong>`);
  if (counts.high) parts.push(`<strong>${counts.high} high</strong>`);
  if (counts.medium) parts.push(`${counts.medium} medium`);
  if (counts.low) parts.push(`${counts.low} low`);
  if (counts.informational) parts.push(`${counts.informational} informational`);
  if (parts.length === 0) return `No findings were identified across the four assessment areas. The domain shows a strong external security posture against the checks performed.`;
  const list = parts.join(', ').replace(/, ([^,]*)$/, ' and $1');
  const subscoreSummary = [];
  if (r.subscores.email.score < 70) subscoreSummary.push('email authentication');
  if (r.subscores.surface.score < 70) subscoreSummary.push('attack surface management');
  if (r.subscores.dns.score < 70) subscoreSummary.push('DNS hygiene');
  if (r.subscores.web.score < 70) subscoreSummary.push('web security');
  const weakSummary = subscoreSummary.length ? ` The weakest areas are ${subscoreSummary.join(' and ')}.` : ` All four sub-scores are at or above passing levels.`;
  return `The assessment identified ${list} findings.${weakSummary} Detailed findings, including their business impact and recommended remediation, follow in the next section.`;
}

function topActions(findings){
  // Filter to high-actionable only
  return findings.filter(f => f.sev === 'critical' || f.sev === 'high');
}

function findingsSection(findings){
  if (findings.length === 0){
    return `<div class="page">
      <h2>Findings</h2>
      <div class="strength">
        <div class="strength-head">✓ No findings identified</div>
        <p>None of the 28 default checks produced a finding for this domain. This is an unusually strong result and indicates a well-managed external posture across email authentication, attack surface, DNS, and web security. Continued monitoring is recommended to detect drift over time.</p>
      </div>
    </div>`;
  }
  return `<div class="page">
    <h2>Findings</h2>
    <p class="muted" style="margin-bottom:14pt">Findings are ordered by severity. Each finding is presented in two registers: a plain-language explanation of why it matters, followed by the technical detail and recommended action.</p>
    ${findings.map(f => renderFindingCard(f)).join('')}
  </div>`;
}

function renderFindingCard(f){
  const t = TEMPLATES[f.id];
  if (!t) return '';
  const techExtra = f.detail ? `\n\nDetail: ${f.detail}` : '';
  const techExtra2 = f.subdomain ? `\n\nSubdomain: ${f.subdomain}\nCNAME target: ${f.target}\nService: ${f.service}` : '';
  return `<div class="finding ${f.sev}">
    <div class="finding-head">
      <div class="finding-headline">${escapeHtml(t.headline)}<span class="finding-id">${f.id}</span></div>
      <span class="finding-sev ${f.sev}">${f.sev}</span>
    </div>
    <div class="finding-section">
      <div class="label">Why this matters</div>
      <div class="body">${t.why}</div>
    </div>
    <div class="finding-section">
      <div class="label">Technical detail</div>
      <div class="finding-tech">${escapeHtml(t.tech + techExtra + techExtra2)}</div>
    </div>
    <div class="finding-action"><strong>Recommended action.</strong> ${t.action}</div>
  </div>`;
}

function subscoreBreakdown(r){
  return `<div class="page">
    <h2 class="pgbreak">Sub-score Breakdown</h2>
    ${categoryBlock('Email Authentication', '35%', r.subscores.email, [
      ['DMARC published', r.raw.dmarc ? 'pass' : 'fail', r.raw.dmarc ? `p=${r.raw.dmarc.p}` : 'not found'],
      ['DMARC enforcement', r.raw.dmarc && r.raw.dmarc.p === 'reject' ? 'pass' : r.raw.dmarc && r.raw.dmarc.p === 'quarantine' ? 'warn' : 'fail', r.raw.dmarc ? r.raw.dmarc.p : '—'],
      ['SPF published', r.raw.spf ? 'pass' : 'fail', r.raw.spf ? r.raw.spf.all || 'configured' : 'not found'],
      ['SPF lookup count', r.raw.spf ? (r.raw.spf.lookups <= 10 ? 'pass' : 'fail') : 'na', r.raw.spf ? `${r.raw.spf.lookups} of 10 max` : '—'],
      ['DKIM common selectors', r.raw.dkimFound ? 'pass' : 'warn', r.raw.dkimFound ? 'at least one selector found' : 'none of common selectors found'],
      ['MTA-STS', r.raw.mtaSts ? 'pass' : 'warn', r.raw.mtaSts ? 'configured' : 'not configured'],
      ['TLS-RPT', r.raw.tlsRpt ? 'pass' : 'na', r.raw.tlsRpt ? 'configured' : 'not configured']
    ])}
    ${categoryBlock('Attack Surface', '30%', r.subscores.surface, [
      ['Certificates observed', 'na', `${r.raw.certCount} total in transparency logs`],
      ['Subdomains catalogued', 'na', `${r.subscores.surface.subdomains?.length || 0} unique`],
      ['CA issuer diversity', (r.subscores.surface.issuers?.length || 0) > 4 ? 'warn' : 'pass', `${r.subscores.surface.issuers?.length || 0} CAs`]
    ])}
    ${categoryBlock('DNS Hygiene', '20%', r.subscores.dns, [
      ['DNSSEC validation', r.raw.dnssec ? 'pass' : 'warn', r.raw.dnssec ? 'AD flag set' : 'not validated'],
      ['CAA records', r.raw.caa && r.raw.caa.length ? 'pass' : 'warn', r.raw.caa && r.raw.caa.length ? `${r.raw.caa.length} record(s)` : 'none'],
      ['Nameserver providers', r.raw.ns && r.raw.ns.length > 1 ? 'pass' : 'warn', `${r.raw.ns ? r.raw.ns.length : 0} provider(s)`]
    ])}
    ${categoryBlock('Web Security', '15%', r.subscores.web, [
      ['HTTPS reachable', r.raw.httpsReachable ? 'pass' : 'fail', r.raw.httpsReachable ? 'yes' : 'no'],
      ['HSTS preload', r.raw.hstsPreload ? 'pass' : 'warn', r.raw.hstsPreload ? 'present in Chromium list' : 'not preloaded']
    ])}
  </div>`;
}

function categoryBlock(name, weight, sub, rows){
  const grade = sub.score >= 90 ? 'A' : sub.score >= 80 ? 'B' : sub.score >= 70 ? 'C' : sub.score >= 60 ? 'D' : 'F';
  const findings = sub.findings;
  const strength = findings.length === 0 ? `<div class="strength"><div class="strength-head">✓ No findings — area is a strength</div><p>All checks in this category passed. ${name} is one of the strongest areas of this domain's posture.</p></div>` : '';
  return `<h3>${name} <span class="muted" style="font-weight:400">— ${sub.score}/100 (${grade}, weight ${weight})</span></h3>
    <table class="checks">
      <thead><tr><th>Check</th><th>Result</th><th>Value</th></tr></thead>
      <tbody>${rows.map(r => `<tr><td>${r[0]}</td><td class="${r[1]}">${r[1] === 'na' ? '—' : r[1].toUpperCase()}</td><td class="mono muted">${escapeHtml(String(r[2]))}</td></tr>`).join('')}</tbody>
    </table>
    ${strength}`;
}

function methodologySection(r){
  return `<div class="page">
    <h2 class="pgbreak">Methodology and Limitations</h2>
    <p>This report is an external-only assessment. It evaluates only signals that are observable from outside the organisation, without authentication, network access, or cooperation from the domain owner.</p>
    <h3>What was assessed</h3>
    <ul class="method-list">
      <li><strong>Email authentication:</strong> DMARC, SPF, DKIM (via probing common selector names), MX records, MTA-STS, TLS-RPT.</li>
      <li><strong>Attack surface:</strong> certificate transparency logs from CertSpotter, subdomain naming patterns, certificate issuer diversity, recency of new certificates.</li>
      <li><strong>DNS hygiene:</strong> DNSSEC validation status, CAA records, nameserver provider diversity.</li>
      <li><strong>Web security:</strong> HTTPS reachability, presence in the Chromium HSTS preload list.</li>
    </ul>
    <h3>What was NOT assessed</h3>
    <ul class="method-list">
      <li>Penetration testing or active exploitation of any kind.</li>
      <li>Authenticated scanning of internal systems, applications, or APIs.</li>
      <li>Internal network architecture, segmentation, or endpoint security.</li>
      <li>Application-layer logic, business workflows, or third-party integrations beyond what is observable in DNS.</li>
      <li>Social engineering risk, phishing simulation, or human factors.</li>
      <li>Physical security, supply-chain provenance, or insider threat.</li>
      <li>HTTP response headers (Content-Security-Policy, X-Frame-Options, Permissions-Policy) — these require server-side inspection and are not visible to a browser-based scanner.</li>
    </ul>
    <h3>Data sources</h3>
    <ul class="method-list">
      <li><strong>DNS records</strong> via Google DNS-over-HTTPS (https://dns.google/resolve).</li>
      <li><strong>Certificate transparency</strong> via SSLMate CertSpotter API (https://api.certspotter.com).</li>
      <li><strong>HSTS preload list</strong> from Chromium source (transport_security_state_static.json).</li>
      <li><strong>Subdomain takeover fingerprints</strong> derived from publicly documented patterns (can-i-take-over-xyz).</li>
    </ul>
    <h3>Known limitations</h3>
    <ul class="method-list">
      <li>DKIM cannot be exhaustively enumerated from DNS. The check probes common selector names only; absence of common selectors does not prove DKIM is unconfigured.</li>
      <li>HSTS via response headers is not detectable from this report; only preload-list membership is verifiable.</li>
      <li>Open-redirect detection from a browser is heuristic and may produce false positives or false negatives.</li>
      <li>Subdomain takeover detection covers the most-recent subdomains only (capped at 100 in the default deep scan) and uses a fixed fingerprint database that may not reflect the most recent service changes.</li>
      <li>Certificate transparency data is cached for 24 hours per domain to respect API rate limits.</li>
    </ul>
    <p class="muted" style="margin-top:14pt;font-size:9.5pt">Generated by Owlglass PostureLens. This report does not constitute a comprehensive security assessment. For a complete view, supplement with internal scanning, penetration testing, and a formal risk assessment.</p>
  </div>`;
}

function appendixSection(domain, r){
  return `<div class="page">
    <h2 class="pgbreak">Appendix · Raw Data</h2>
    <div class="appendix-block">
      <div class="label">DMARC record</div>
      <pre>${escapeHtml(r.raw.dmarc ? r.raw.dmarc.raw : '(none found)')}</pre>
    </div>
    <div class="appendix-block">
      <div class="label">SPF record</div>
      <pre>${escapeHtml(r.raw.spf ? r.raw.spf.raw : '(none found)')}</pre>
    </div>
    <div class="appendix-block">
      <div class="label">MX records</div>
      <pre>${escapeHtml((r.raw.mx && r.raw.mx.length) ? r.raw.mx.join('\n') : '(none)')}</pre>
    </div>
    <div class="appendix-block">
      <div class="label">CAA records</div>
      <pre>${escapeHtml((r.raw.caa && r.raw.caa.length) ? r.raw.caa.join('\n') : '(none)')}</pre>
    </div>
    <div class="appendix-block">
      <div class="label">Nameserver providers</div>
      <pre>${escapeHtml((r.raw.ns && r.raw.ns.length) ? r.raw.ns.join('\n') : '(none)')}</pre>
    </div>
    <div class="appendix-block">
      <div class="label">Certificate transparency summary</div>
      <pre>Total certificates observed: ${r.raw.certCount}\nUnique subdomains: ${r.subscores.surface.subdomains?.length || 0}\nDistinct issuing CAs: ${r.subscores.surface.issuers?.length || 0}</pre>
    </div>
    <div class="appendix-block">
      <div class="label">Subdomains (up to 50 shown)</div>
      <pre>${escapeHtml(((r.subscores.surface.subdomains || []).slice(0,50)).join('\n') || '(none)')}</pre>
    </div>
    <div class="appendix-block">
      <div class="label">Scan metadata</div>
      <pre>Scan timestamp: ${new Date(r.scannedAt).toISOString()}\nOverall score: ${r.overall}/100\nOverall grade: ${r.grade}\nEmail Authentication: ${r.subscores.email.score}/100\nAttack Surface: ${r.subscores.surface.score}/100\nDNS Hygiene: ${r.subscores.dns.score}/100\nWeb Security: ${r.subscores.web.score}/100</pre>
    </div>
  </div>`;
}

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
