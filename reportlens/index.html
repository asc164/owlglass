<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ReportLens · Owlglass</title>
<meta name="description" content="Free, browser-based reporting tool: upload data, get instant insights, build reports, export to PDF. No data leaves your browser.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<style>
:root{
  --rl-bg:#fafafa;
  --rl-surface:#ffffff;
  --rl-border:#e5e5e7;
  --rl-border-strong:#d1d1d6;
  --rl-text:#1c1c1e;
  --rl-text-dim:#6b6b70;
  --rl-text-faint:#a1a1a6;
  --rl-accent:#6b4eff;
  --rl-accent-dim:#efeaff;
  --rl-success:#16a34a;
  --rl-warn:#d97706;
  --rl-error:#dc2626;
  --rl-info:#2563eb;
}
.rl-wrap{max-width:1280px;margin:0 auto;padding:20px 12px 64px;color:var(--rl-text);font-family:'Inter',system-ui,sans-serif}
.rl-crumb{font-size:.82rem;color:var(--rl-text-dim);margin-bottom:12px}
.rl-crumb a{color:var(--rl-text-dim);text-decoration:none}
.rl-crumb a:hover{color:var(--rl-accent)}

.rl-topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.rl-topbar h1{font-size:1.5rem;font-weight:700;margin:0;margin-right:10px}
.rl-topbar .rl-spacer{flex:1}
.rl-btn{background:var(--rl-accent);color:#fff;border:0;padding:7px 13px;border-radius:6px;font-size:.85rem;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.rl-btn:hover{background:#5a3eef}
.rl-btn:disabled{background:var(--rl-text-faint);cursor:not-allowed}
.rl-btn.secondary{background:var(--rl-surface);color:var(--rl-text);border:1px solid var(--rl-border-strong)}
.rl-btn.secondary:hover{background:#f5f5f7;border-color:var(--rl-text-faint)}
.rl-btn.ghost{background:transparent;color:var(--rl-text-dim);border:0;padding:4px 8px}
.rl-btn.ghost:hover{color:var(--rl-accent);background:var(--rl-accent-dim)}
.rl-btn.danger{background:transparent;color:var(--rl-error);border:1px solid var(--rl-error);padding:6px 10px}
.rl-btn.danger:hover{background:#fee2e2}
.rl-btn.small{padding:4px 9px;font-size:.78rem}

.rl-empty{background:var(--rl-surface);border:1px solid var(--rl-border);border-radius:12px;padding:48px 24px;text-align:center}
.rl-empty h2{font-size:1.4rem;font-weight:600;margin:0 0 8px}
.rl-empty p{color:var(--rl-text-dim);margin:0 0 24px;max-width:480px;margin-left:auto;margin-right:auto}
.rl-drop{border:2px dashed var(--rl-border-strong);border-radius:10px;padding:36px;cursor:pointer;transition:all .15s;max-width:520px;margin:0 auto}
.rl-drop:hover,.rl-drop.dragover{border-color:var(--rl-accent);background:var(--rl-accent-dim)}
.rl-drop p{margin:6px 0;color:var(--rl-text-dim)}
.rl-drop .rl-drop-main{font-size:1rem;color:var(--rl-text);font-weight:500}
.rl-drop .rl-drop-sub{font-size:.82rem}
.rl-drop input[type=file]{display:none}

.rl-source{background:var(--rl-surface);border:1px solid var(--rl-border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;font-size:.85rem;color:var(--rl-text-dim)}
.rl-source strong{color:var(--rl-text);font-weight:600}
.rl-source .rl-source-actions{margin-left:auto;display:flex;gap:6px}
.rl-title-input{background:transparent;border:0;border-bottom:1px dashed transparent;font-size:1.05rem;font-weight:600;color:var(--rl-text);font-family:inherit;padding:2px 4px;min-width:240px;outline:none;border-radius:0}
.rl-title-input:hover{border-bottom-color:var(--rl-border-strong)}
.rl-title-input:focus{border-bottom-color:var(--rl-accent)}

.rl-filterbar{background:var(--rl-surface);border:1px solid var(--rl-border);border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rl-filterbar-label{font-size:.78rem;color:var(--rl-text-dim);font-weight:500;margin-right:2px}
.rl-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 8px 4px 10px;background:var(--rl-accent-dim);color:var(--rl-accent);border-radius:14px;font-size:.8rem;font-weight:500}
.rl-chip .rl-x{cursor:pointer;font-size:1rem;line-height:1;padding:0 2px;opacity:.7}
.rl-chip .rl-x:hover{opacity:1}
.rl-filterbar .rl-summary{margin-left:auto;font-size:.8rem;color:var(--rl-text-dim)}
.rl-filterbar .rl-summary strong{color:var(--rl-text)}
.rl-filter-mode{display:inline-flex;gap:0;border:1px solid var(--rl-border-strong);border-radius:4px;overflow:hidden}
.rl-filter-mode button{background:var(--rl-surface);color:var(--rl-text-dim);border:0;padding:3px 9px;font-size:.74rem;cursor:pointer;font-family:inherit}
.rl-filter-mode button.active{background:var(--rl-accent);color:#fff}

.rl-popover{position:absolute;background:var(--rl-surface);border:1px solid var(--rl-border-strong);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:12px;z-index:200;min-width:300px;display:flex;flex-direction:column;gap:8px}
.rl-popover select,.rl-popover input{padding:6px 8px;border:1px solid var(--rl-border-strong);border-radius:4px;font-size:.85rem;font-family:inherit;background:var(--rl-surface)}
.rl-popover-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:4px}

.rl-kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:14px}
.rl-kpi{background:var(--rl-surface);border:1px solid var(--rl-border);border-radius:8px;padding:14px;position:relative;min-height:88px}
.rl-kpi-label{font-size:.72rem;color:var(--rl-text-dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;font-weight:500}
.rl-kpi-value{font-size:1.6rem;font-weight:700;color:var(--rl-text);line-height:1.1;letter-spacing:-0.01em}
.rl-kpi-sub{font-size:.72rem;color:var(--rl-text-dim);margin-top:4px}
.rl-kpi .rl-kpi-remove{position:absolute;top:6px;right:6px;opacity:0;transition:opacity .12s;background:transparent;border:0;color:var(--rl-text-faint);font-size:.9rem;cursor:pointer;padding:2px 6px;border-radius:3px}
.rl-kpi:hover .rl-kpi-remove{opacity:1}
.rl-kpi .rl-kpi-remove:hover{background:#fee2e2;color:var(--rl-error)}
.rl-kpi-add{background:#fbfbfd;border:1px dashed var(--rl-border-strong);border-radius:8px;padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--rl-text-dim);font-size:.85rem;font-weight:500;min-height:88px}
.rl-kpi-add:hover{border-color:var(--rl-accent);color:var(--rl-accent);background:var(--rl-accent-dim)}

.rl-kpi-list{display:flex;flex-direction:column;gap:4px;margin-top:2px}
.rl-kpi-list-row{display:flex;align-items:baseline;gap:8px;font-size:.82rem;line-height:1.3;cursor:pointer;padding:1px 2px;border-radius:3px}
.rl-kpi-list-row:hover{background:#f5f5f7}
.rl-kpi-list-rank{color:var(--rl-text-faint);font-size:.7rem;width:14px;flex-shrink:0}
.rl-kpi-list-name{color:var(--rl-text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.rl-kpi-list-count{color:var(--rl-text-dim);font-variant-numeric:tabular-nums;font-size:.78rem;flex-shrink:0}

.rl-chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));gap:12px;margin-bottom:14px}
.rl-chart-card{background:var(--rl-surface);border:1px solid var(--rl-border);border-radius:8px;padding:14px;display:flex;flex-direction:column}
.rl-chart-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rl-chart-title{font-size:.92rem;font-weight:600;color:var(--rl-text);flex:1;background:transparent;border:0;font-family:inherit;padding:2px 4px;border-bottom:1px dashed transparent;outline:none}
.rl-chart-title:hover{border-bottom-color:var(--rl-border-strong)}
.rl-chart-title:focus{border-bottom-color:var(--rl-accent)}
.rl-chart-actions{display:flex;gap:2px}
.rl-chart-options{padding:10px;background:#fbfbfd;border:1px solid var(--rl-border);border-radius:6px;margin-bottom:10px;display:none;flex-wrap:wrap;gap:6px;align-items:center}
.rl-chart-options.open{display:flex}
.rl-chart-options select{padding:4px 7px;border:1px solid var(--rl-border-strong);border-radius:4px;font-size:.8rem;font-family:inherit;background:var(--rl-surface)}
.rl-chart-options label{font-size:.72rem;color:var(--rl-text-dim);margin-right:-2px}
.rl-chart-body{background:#fbfbfd;border-radius:6px;padding:10px;height:280px;position:relative}
.rl-chart-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--rl-text-faint);font-size:.85rem;text-align:center;padding:20px}
.rl-chart-meta{font-size:.72rem;color:var(--rl-text-dim);margin-top:6px;display:flex;justify-content:space-between;align-items:center}
.rl-chart-meta .rl-drill-hint{color:var(--rl-accent);opacity:.7}
.rl-chart-add{background:#fbfbfd;border:1px dashed var(--rl-border-strong);border-radius:8px;padding:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--rl-text-dim);font-size:.9rem;font-weight:500;min-height:280px}
.rl-chart-add:hover{border-color:var(--rl-accent);color:var(--rl-accent);background:var(--rl-accent-dim)}

.rl-suggest{background:var(--rl-surface);border:1px solid var(--rl-border);border-radius:8px;padding:14px;margin-bottom:14px}
.rl-suggest-head{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--rl-text)}
.rl-suggest-head .rl-caret{font-size:.7rem;color:var(--rl-text-dim);transition:transform .15s}
.rl-suggest.open .rl-caret{transform:rotate(90deg)}
.rl-suggest-body{display:none;margin-top:10px;flex-wrap:wrap;gap:6px}
.rl-suggest.open .rl-suggest-body{display:flex}
.rl-suggest-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#fbfbfd;border:1px solid var(--rl-border-strong);border-radius:14px;font-size:.8rem;cursor:pointer;color:var(--rl-text)}
.rl-suggest-chip:hover{border-color:var(--rl-accent);color:var(--rl-accent);background:var(--rl-accent-dim)}
.rl-suggest-chip .rl-plus{color:var(--rl-accent);font-weight:700}

.rl-notes{background:var(--rl-surface);border:1px solid var(--rl-border);border-radius:8px;padding:14px;margin-bottom:14px}
.rl-notes-label{font-size:.78rem;color:var(--rl-text-dim);font-weight:500;margin-bottom:6px;display:block}
.rl-notes textarea{width:100%;min-height:60px;padding:8px;border:1px solid var(--rl-border);border-radius:6px;font-family:inherit;font-size:.88rem;color:var(--rl-text);resize:vertical;background:#fbfbfd;outline:none}
.rl-notes textarea:focus{border-color:var(--rl-accent);background:var(--rl-surface)}

/* Tables section header */
.rl-tables-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:0 4px}
.rl-tables-header h2{font-size:1.05rem;font-weight:600;margin:0}
.rl-tables-header .rl-spacer{flex:1}

/* Each table view card */
.rl-table-view{background:var(--rl-surface);border:1px solid var(--rl-border);border-radius:8px;margin-bottom:12px;overflow:visible}
.rl-tv-head{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--rl-surface);border-bottom:1px solid transparent;cursor:pointer}
.rl-table-view.open .rl-tv-head{border-bottom-color:var(--rl-border)}
.rl-tv-caret{font-size:.7rem;color:var(--rl-text-dim);transition:transform .15s}
.rl-table-view.open .rl-tv-caret{transform:rotate(90deg)}
.rl-tv-name{font-size:.92rem;font-weight:600;background:transparent;border:0;border-bottom:1px dashed transparent;font-family:inherit;color:var(--rl-text);padding:2px 4px;outline:none;min-width:140px}
.rl-tv-name:hover{border-bottom-color:var(--rl-border-strong)}
.rl-tv-name:focus{border-bottom-color:var(--rl-accent)}
.rl-tv-meta{font-size:.78rem;color:var(--rl-text-dim);margin-left:auto;display:flex;align-items:center;gap:10px}
.rl-tv-actions{display:flex;gap:2px}
.rl-tv-body{display:none}
.rl-table-view.open .rl-tv-body{display:block}
.rl-tv-toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--rl-border);background:#fbfbfd}

/* Search */
.rl-search-wrap{position:relative;display:inline-flex;align-items:center;flex:1;max-width:520px;min-width:240px}
.rl-search-input{padding:6px 56px 6px 10px;border:1px solid var(--rl-border-strong);border-radius:4px;font-size:.85rem;font-family:inherit;width:100%;outline:none;background:var(--rl-surface)}
.rl-search-input:focus{border-color:var(--rl-accent)}
.rl-search-input.rl-q-invalid{border-color:var(--rl-error)}
.rl-search-input.rl-q-warn{border-color:var(--rl-warn)}
.rl-search-status{position:absolute;right:30px;top:50%;transform:translateY(-50%);font-size:.85rem;line-height:1;pointer-events:none}
.rl-search-status.ok{color:var(--rl-success)}
.rl-search-status.warn{color:var(--rl-warn)}
.rl-search-status.err{color:var(--rl-error)}
.rl-search-help{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--rl-text-faint);color:#fff;border:0;border-radius:50%;width:18px;height:18px;font-size:.7rem;line-height:18px;text-align:center;padding:0;cursor:pointer;font-weight:700}
.rl-search-help:hover{background:var(--rl-accent)}

.rl-search-tip{position:absolute;top:calc(100% + 4px);left:0;right:auto;background:var(--rl-surface);color:var(--rl-text);font-size:.78rem;padding:12px 14px;border:1px solid var(--rl-border-strong);border-radius:6px;line-height:1.55;z-index:90;display:none;box-shadow:0 6px 18px rgba(0,0,0,.1);min-width:340px;max-width:440px}
.rl-search-tip.show{display:block}
.rl-search-tip h4{margin:0 0 6px;font-size:.82rem;font-weight:600}
.rl-search-tip code{background:#f0f0f3;padding:1px 5px;border-radius:3px;font-size:.74rem;font-family:'SF Mono',Menlo,Consolas,monospace;color:var(--rl-accent);cursor:pointer}
.rl-search-tip code:hover{background:var(--rl-accent-dim)}
.rl-search-tip .rl-tip-row{margin:4px 0;display:flex;gap:8px;align-items:baseline}
.rl-search-tip .rl-tip-row span{color:var(--rl-text-dim);font-size:.74rem}

.rl-search-examples{display:none;position:absolute;top:calc(100% + 4px);left:0;right:auto;background:var(--rl-surface);border:1px solid var(--rl-border-strong);border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.1);padding:8px;z-index:80;min-width:300px;flex-wrap:wrap;gap:6px}
.rl-search-examples.show{display:flex}
.rl-search-examples .rl-ex-label{width:100%;font-size:.72rem;color:var(--rl-text-dim);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.rl-search-ex{display:inline-flex;align-items:center;padding:3px 9px;background:#fbfbfd;border:1px solid var(--rl-border);border-radius:12px;font-size:.78rem;cursor:pointer;color:var(--rl-text);font-family:'SF Mono',Menlo,Consolas,monospace}
.rl-search-ex:hover{border-color:var(--rl-accent);color:var(--rl-accent);background:var(--rl-accent-dim)}

.rl-cols-dropdown{position:relative}
.rl-cols-popup{position:absolute;top:calc(100% + 4px);left:0;background:var(--rl-surface);border:1px solid var(--rl-border-strong);border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.1);max-height:320px;overflow-y:auto;padding:6px;z-index:50;display:none;min-width:220px}
.rl-cols-dropdown.open .rl-cols-popup{display:block}
.rl-col-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;cursor:pointer;font-size:.82rem}
.rl-col-row:hover{background:#f5f5f7}
.rl-col-row .rl-type{font-size:.66rem;color:var(--rl-text-faint);padding:1px 5px;background:#f0f0f3;border-radius:3px;margin-left:auto;cursor:pointer}

.rl-table-wrap{overflow:auto;max-height:520px}
.rl-table{width:100%;border-collapse:collapse;font-size:.84rem}
.rl-table thead{background:#f5f5f7;position:sticky;top:0;z-index:5}
.rl-table th{text-align:left;padding:8px 10px;font-weight:600;color:var(--rl-text);border-bottom:1px solid var(--rl-border);cursor:pointer;white-space:nowrap;user-select:none}
.rl-table th:hover{background:#ececef}
.rl-table th.sorted{color:var(--rl-accent)}
.rl-table th .rl-sort-ind{font-size:.7rem;margin-left:4px;opacity:.7}
.rl-table td{padding:6px 10px;border-bottom:1px solid #f0f0f3;color:var(--rl-text);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rl-table tr:hover td{background:#fafafd}

.rl-add-view{background:#fbfbfd;border:1px dashed var(--rl-border-strong);border-radius:8px;padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--rl-text-dim);font-size:.85rem;font-weight:500}
.rl-add-view:hover{border-color:var(--rl-accent);color:var(--rl-accent);background:var(--rl-accent-dim)}

.rl-toast{position:fixed;bottom:20px;right:20px;background:var(--rl-text);color:#fff;padding:10px 16px;border-radius:6px;font-size:.85rem;box-shadow:0 4px 12px rgba(0,0,0,.18);z-index:1000;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;max-width:340px}
.rl-toast.show{opacity:1;transform:translateY(0)}
.rl-toast.err{background:var(--rl-error)}
.rl-toast.ok{background:var(--rl-success)}

.rl-status{margin-top:10px;font-size:.85rem;min-height:18px}
.rl-status.err{color:var(--rl-error)}
.rl-status.ok{color:var(--rl-success)}

@media print{
  body *{visibility:hidden}
  .rl-print-area,.rl-print-area *{visibility:visible}
  .rl-print-area{position:absolute;left:0;top:0;width:100%}
  .rl-chart-body{page-break-inside:avoid}
}
@media (max-width:760px){
  .rl-wrap{padding:14px 6px 40px}
  .rl-chart-grid{grid-template-columns:1fr}
  .rl-chart-body{height:240px}
}
</style>
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main class="main">
      <div class="main-inner">
        <button class="mobile-toggle" aria-label="Toggle menu"></button>
        <div class="rl-wrap">

          <div class="rl-crumb"><a href="/">Owlglass</a> / ReportLens</div>

          <div class="rl-topbar">
            <h1>ReportLens</h1>
            <div class="rl-spacer"></div>
            <button class="rl-btn secondary" id="rl-upload-btn">Upload file</button>
            <button class="rl-btn secondary" id="rl-saved-btn" disabled title="Coming soon">Saved reports ▾</button>
            <button class="rl-btn" id="rl-pdf-btn" disabled>Export PDF</button>
            <input type="file" id="rl-file" accept=".csv,.tsv,.json,.txt" style="display:none">
          </div>

          <div id="rl-empty-state" class="rl-empty">
            <h2>Drop a file to start</h2>
            <p>Upload CSV or JSON. ReportLens will analyze it instantly — KPIs, charts, and a data table, ready to share. Everything runs in your browser; nothing is uploaded.</p>
            <label class="rl-drop" id="rl-drop">
              <p class="rl-drop-main">Drop a file here or click to choose</p>
              <p class="rl-drop-sub">Supported: .csv, .tsv, .json · max 10 MB / 50,000 rows</p>
              <input type="file" id="rl-drop-file" accept=".csv,.tsv,.json,.txt">
            </label>
            <div class="rl-status" id="rl-upload-status"></div>
          </div>

          <div id="rl-dashboard" style="display:none">

            <div class="rl-source" id="rl-source">
              <span id="rl-source-info"></span>
              <div class="rl-source-actions">
                <button class="rl-btn ghost small" id="rl-replace-data" disabled title="Coming soon">Replace data</button>
                <button class="rl-btn ghost small" id="rl-clear-all">Clear</button>
              </div>
            </div>

            <input type="text" class="rl-title-input" id="rl-report-title" placeholder="Untitled report" value="">

            <div class="rl-filterbar" id="rl-filterbar"></div>

            <div class="rl-kpi-grid" id="rl-kpi-grid"></div>

            <div class="rl-chart-grid" id="rl-chart-grid"></div>

            <div class="rl-suggest" id="rl-suggest">
              <div class="rl-suggest-head" id="rl-suggest-head">
                <span class="rl-caret">▶</span>
                <span>Suggested views</span>
                <span style="margin-left:auto;font-size:.78rem;color:var(--rl-text-dim);font-weight:400" id="rl-suggest-count"></span>
              </div>
              <div class="rl-suggest-body" id="rl-suggest-body"></div>
            </div>

            <div class="rl-notes">
              <label class="rl-notes-label">Notes (included in PDF)</label>
              <textarea id="rl-notes" placeholder="Add commentary, observations, or context for this report…"></textarea>
            </div>

            <div class="rl-tables-header">
              <h2>Data tables</h2>
              <div class="rl-spacer"></div>
              <button class="rl-btn secondary small" id="rl-add-table-btn">+ New table view</button>
            </div>

            <div id="rl-tables-host"></div>

          </div>

        </div>
      </div>
    </main>
  </div>

  <div class="rl-toast" id="rl-toast"></div>

  <script src="/assets/shared.js"></script>
  <script>Owlglass.mount({ active: 'reportlens' });</script>
  <script src="/assets/papaparse.min.js"></script>
  <script src="/assets/chart.umd.min.js"></script>
  <script src="/assets/xlsx.full.min.js"></script>
  <script>
  (function(){
    'use strict';

    const MAX_BYTES = 10 * 1024 * 1024;
    const MAX_ROWS = 50000;
    const TABLE_RENDER_CAP = 1000;
    const TYPE_SAMPLE_SIZE = 100;
    const MAX_KPIS = 6;
    const MAX_GROUPS = 4;
    const TOPN_DEFAULT = 5;
    const SEARCH_DEBOUNCE_MS = 150;

    const NUMERIC_PRIORITY_WORDS = ['revenue','sales','amount','total','price','profit','cost','spend','margin','count','qty','quantity','units','orders','value'];
    const ID_LIKE_WORDS = ['id','uuid','guid','key','hash'];
    const DATE_PRIORITY_WORDS = ['date','created','timestamp','time','day','month','period'];

    const state = {
      rawFileName: null,
      reportTitle: '',
      notes: '',
      rows: [],
      columns: [],
      filters: [],
      filterMode: 'and',
      sort: { column: null, dir: 'asc' },
      kpis: [],
      charts: [],
      suggestions: [],
      suggestOpen: false,
      tableViews: [],          // [{id, name, search, sort, selectedColumns:Set<string>|null, open}]
      nextChartId: 1,
      nextKpiId: 1,
      nextFilterId: 1,
      nextViewId: 1,
      // Search indexing
      rowHaystacks: [],        // parallel array of lowercase concatenated row strings (for plain search)
      rowFieldIndex: [],       // parallel array of { colNameLower -> lowerValue } (for field:value search)
      filteredCache: null,     // cached filtered rows for the current filter state
      filteredCacheKey: null,
    };

    const $ = id => document.getElementById(id);
    const el = (tag, attrs, ...kids) => {
      const node = document.createElement(tag);
      if (attrs) for (const k in attrs) {
        if (k === 'class') node.className = attrs[k];
        else if (k === 'html') node.innerHTML = attrs[k];
        else if (k.startsWith('on') && typeof attrs[k] === 'function') node.addEventListener(k.slice(2), attrs[k]);
        else if (attrs[k] != null && attrs[k] !== false) node.setAttribute(k, attrs[k]);
      }
      kids.flat().forEach(k => {
        if (k == null || k === false) return;
        node.appendChild(typeof k === 'string' ? document.createTextNode(k) : k);
      });
      return node;
    };
    const escapeHtml = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    let toastTimer;
    function toast(msg, kind) {
      const t = $('rl-toast');
      t.textContent = msg;
      t.className = 'rl-toast show' + (kind ? ' ' + kind : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = 'rl-toast' + (kind ? ' ' + kind : ''); }, 3000);
    }
    function status(msg, kind) {
      const n = $('rl-upload-status');
      n.textContent = msg || '';
      n.className = 'rl-status' + (kind ? ' ' + kind : '');
    }

    function fmtNumber(n) {
      if (n == null || !Number.isFinite(n)) return '—';
      const abs = Math.abs(n);
      if (abs >= 1e9) return (n / 1e9).toFixed(abs >= 1e10 ? 1 : 2) + 'B';
      if (abs >= 1e6) return (n / 1e6).toFixed(abs >= 1e7 ? 1 : 2) + 'M';
      if (abs >= 1e3) return (n / 1e3).toFixed(abs >= 1e4 ? 1 : 2) + 'K';
      if (Number.isInteger(n)) return n.toLocaleString();
      return n.toFixed(2);
    }
    function fmtInt(n) {
      if (n == null || !Number.isFinite(n)) return '—';
      return Math.round(n).toLocaleString();
    }
    function fmtDate(ms) {
      if (ms == null || !Number.isFinite(ms)) return '—';
      const d = new Date(ms);
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function inferType(values) {
      const sample = values.filter(v => v != null && v !== '').slice(0, TYPE_SAMPLE_SIZE);
      if (sample.length === 0) return 'string';
      let nums = 0, bools = 0, dates = 0;
      const boolish = new Set(['true','false','yes','no','y','n']);
      for (const v of sample) {
        const s = String(v).trim().toLowerCase();
        if (boolish.has(s)) bools++;
        const n = Number(s);
        if (Number.isFinite(n) && s !== '') nums++;
        if (!(Number.isFinite(n) && s !== '')) {
          const d = Date.parse(v);
          if (!isNaN(d)) {
            const y = new Date(d).getFullYear();
            if (y >= 1900 && y <= 2100) dates++;
          }
        }
      }
      const total = sample.length;
      if (bools / total > 0.9) return 'boolean';
      if (dates / total > 0.7 && nums / total < 0.6) return 'date';
      if (nums / total > 0.9) return 'number';
      return 'string';
    }

    function coerce(val, type) {
      if (val == null || val === '') return null;
      if (type === 'number') {
        const n = Number(val);
        return Number.isFinite(n) ? n : null;
      }
      if (type === 'boolean') {
        const s = String(val).trim().toLowerCase();
        if (['true','yes','y','1'].includes(s)) return true;
        if (['false','no','n','0'].includes(s)) return false;
        return null;
      }
      if (type === 'date') {
        const d = Date.parse(val);
        return isNaN(d) ? null : d;
      }
      return String(val);
    }

    function isIdLike(name) {
      const lc = name.toLowerCase();
      return ID_LIKE_WORDS.some(w => lc === w || lc.endsWith('_' + w) || lc.endsWith(w) || lc.startsWith(w + '_'));
    }
    function numericPriorityScore(name) {
      const lc = name.toLowerCase();
      for (let i = 0; i < NUMERIC_PRIORITY_WORDS.length; i++) if (lc.includes(NUMERIC_PRIORITY_WORDS[i])) return NUMERIC_PRIORITY_WORDS.length - i;
      return 0;
    }
    function datePriorityScore(name) {
      const lc = name.toLowerCase();
      for (let i = 0; i < DATE_PRIORITY_WORDS.length; i++) if (lc.includes(DATE_PRIORITY_WORDS[i])) return DATE_PRIORITY_WORDS.length - i;
      return 0;
    }
    function cardinality(colName) {
      const set = new Set();
      for (let i = 0; i < state.rows.length; i++) {
        const v = state.rows[i][colName];
        if (v != null && v !== '') set.add(String(v));
        if (set.size > 5000) break;
      }
      return set.size;
    }

    function flattenObject(obj, prefix, out) {
      out = out || {};
      prefix = prefix || '';
      for (const k in obj) {
        const v = obj[k];
        const key = prefix ? prefix + '.' + k : k;
        if (v && typeof v === 'object' && !Array.isArray(v) && !(v instanceof Date)) flattenObject(v, key, out);
        else if (Array.isArray(v)) out[key] = JSON.stringify(v);
        else out[key] = v;
      }
      return out;
    }
    function findRowArray(json) {
      if (Array.isArray(json) && json.length && typeof json[0] === 'object' && !Array.isArray(json[0])) return json;
      let best = null, bestLen = 0;
      function walk(node) {
        if (Array.isArray(node) && node.length && typeof node[0] === 'object' && !Array.isArray(node[0])) {
          if (node.length > bestLen) { best = node; bestLen = node.length; }
        }
        if (node && typeof node === 'object') for (const k in node) walk(node[k]);
      }
      walk(json);
      return best;
    }

    function handleFile(file) {
      if (!file) return;
      if (file.size > MAX_BYTES) { status(`File is ${(file.size/1048576).toFixed(1)} MB — exceeds the 10 MB limit.`, 'err'); return; }
      status(`Reading ${file.name}…`);
      const name = file.name.toLowerCase();
      const reader = new FileReader();
      reader.onerror = () => status('Could not read file.', 'err');
      reader.onload = () => {
        try {
          if (name.endsWith('.json')) parseJSON(reader.result, file.name);
          else parseCSV(reader.result, file.name, name.endsWith('.tsv') ? '\t' : undefined);
        } catch (e) { status('Parse error: ' + e.message, 'err'); }
      };
      reader.readAsText(file);
    }
    function parseCSV(text, fileName, delimiter) {
      const opts = { header: true, skipEmptyLines: true, dynamicTyping: false };
      if (delimiter) opts.delimiter = delimiter;
      const result = Papa.parse(text, opts);
      if (result.errors && result.errors.length) {
        const fatal = result.errors.find(e => e.type !== 'FieldMismatch');
        if (fatal && (!result.data || result.data.length === 0)) { status('CSV parse error: ' + fatal.message, 'err'); return; }
      }
      let rows = result.data || [];
      if (rows.length > MAX_ROWS) { rows = rows.slice(0, MAX_ROWS); toast(`Truncated to ${MAX_ROWS.toLocaleString()} rows.`, 'err'); }
      ingestRows(rows, fileName);
    }
    function parseJSON(text, fileName) {
      const json = JSON.parse(text);
      const arr = findRowArray(json);
      if (!arr) { status('No array of objects found in JSON.', 'err'); return; }
      let rows = arr.map(r => flattenObject(r));
      if (rows.length > MAX_ROWS) { rows = rows.slice(0, MAX_ROWS); toast(`Truncated to ${MAX_ROWS.toLocaleString()} rows.`, 'err'); }
      ingestRows(rows, fileName);
    }

    function buildSearchIndex() {
      const cols = state.columns.map(c => c.name);
      const colsLower = cols.map(c => c.toLowerCase());
      state.rowHaystacks = new Array(state.rows.length);
      state.rowFieldIndex = new Array(state.rows.length);
      for (let i = 0; i < state.rows.length; i++) {
        const r = state.rows[i];
        const parts = [];
        const field = {};
        for (let j = 0; j < cols.length; j++) {
          const v = r[cols[j]];
          const lv = v == null ? '' : String(v).toLowerCase();
          parts.push(lv);
          field[colsLower[j]] = lv;
        }
        state.rowHaystacks[i] = parts.join('\u0001');
        state.rowFieldIndex[i] = field;
      }
    }

    function ingestRows(rows, fileName) {
      if (!rows.length) { status('No rows found.', 'err'); return; }
      const keySet = new Set();
      rows.forEach(r => { for (const k in r) keySet.add(k); });
      const cols = Array.from(keySet);
      const columns = cols.map(name => {
        const values = rows.map(r => r[name]);
        return { name, type: inferType(values), selected: true, source: 'file' };
      });

      state.rawFileName = fileName;
      state.reportTitle = fileName.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ');
      state.rows = rows;
      state.columns = columns;
      state.filters = [];
      state.sort = { column: null, dir: 'asc' };
      state.notes = '';
      destroyAllCharts();
      state.charts = [];
      state.kpis = [];
      state.tableViews = [];
      state.filteredCache = null;
      state.filteredCacheKey = null;

      buildSearchIndex();
      autoAnalyze();

      // Create default table view
      state.tableViews.push({
        id: state.nextViewId++,
        name: 'All data',
        search: '',
        sort: { column: null, dir: 'asc' },
        selectedColumns: null, // null means use global state.columns.selected
        open: true
      });

      $('rl-empty-state').style.display = 'none';
      $('rl-dashboard').style.display = '';
      $('rl-pdf-btn').disabled = false;
      $('rl-report-title').value = state.reportTitle;
      $('rl-notes').value = state.notes;
      $('rl-source-info').innerHTML = `<strong>${escapeHtml(fileName)}</strong> · ${rows.length.toLocaleString()} rows · ${columns.length} columns`;

      renderAll();
    }

    function autoAnalyze() {
      const cols = state.columns;
      const numCols = cols.filter(c => c.type === 'number' && !isIdLike(c.name));
      const dateCols = cols.filter(c => c.type === 'date');
      const catCols = cols.filter(c => c.type === 'string' || c.type === 'boolean');

      numCols.sort((a, b) => numericPriorityScore(b.name) - numericPriorityScore(a.name));
      dateCols.sort((a, b) => datePriorityScore(b.name) - datePriorityScore(a.name));

      const catScored = catCols.map(c => ({ col: c, card: cardinality(c.name) }))
        .filter(x => x.card >= 2 && x.card <= 50 && !isIdLike(x.col.name))
        .sort((a, b) => a.card - b.card);

      state.kpis = [];
      state.kpis.push({ id: state.nextKpiId++, type: 'count', column: null, label: 'Rows' });
      numCols.slice(0, 2).forEach(c => state.kpis.push({ id: state.nextKpiId++, type: 'sum', column: c.name, label: c.name }));
      if (dateCols.length) state.kpis.push({ id: state.nextKpiId++, type: 'span', column: dateCols[0].name, label: dateCols[0].name + ' span' });
      if (catScored.length && state.kpis.length < MAX_KPIS) state.kpis.push({ id: state.nextKpiId++, type: 'distinct', column: catScored[0].col.name, label: catScored[0].col.name });

      state.charts = [];
      if (dateCols.length && numCols.length) state.charts.push({ id: state.nextChartId++, type: 'line', groups: [dateCols[0].name], y: numCols[0].name, agg: 'sum', title: `${numCols[0].name} over ${dateCols[0].name}`, optionsOpen: false });
      if (catScored.length && numCols.length) state.charts.push({ id: state.nextChartId++, type: 'bar', groups: [catScored[0].col.name], y: numCols[0].name, agg: 'sum', title: `${numCols[0].name} by ${catScored[0].col.name}`, optionsOpen: false });
      if (catScored.length >= 2) state.charts.push({ id: state.nextChartId++, type: 'bar', groups: [catScored[1].col.name], y: null, agg: 'count', title: `Row count by ${catScored[1].col.name}`, optionsOpen: false });
      else if (catScored.length === 1 && state.charts.length < 3) state.charts.push({ id: state.nextChartId++, type: 'pie', groups: [catScored[0].col.name], y: null, agg: 'count', title: `Distribution: ${catScored[0].col.name}`, optionsOpen: false });

      const inUse = new Set(state.charts.map(c => JSON.stringify({ g: c.groups, y: c.y, agg: c.agg })));
      const sugg = [];
      catScored.forEach(({ col: catCol }) => {
        numCols.forEach(numCol => {
          const key = JSON.stringify({ g: [catCol.name], y: numCol.name, agg: 'sum' });
          if (inUse.has(key)) return;
          sugg.push({ id: 's' + sugg.length, label: `${numCol.name} by ${catCol.name}`, payload: { type: 'bar', groups: [catCol.name], y: numCol.name, agg: 'sum', title: `${numCol.name} by ${catCol.name}` } });
        });
      });
      dateCols.forEach(dCol => numCols.forEach(numCol => {
        const key = JSON.stringify({ g: [dCol.name], y: numCol.name, agg: 'sum' });
        if (inUse.has(key)) return;
        sugg.push({ id: 's' + sugg.length, label: `${numCol.name} over ${dCol.name}`, payload: { type: 'line', groups: [dCol.name], y: numCol.name, agg: 'sum', title: `${numCol.name} over ${dCol.name}` } });
      }));
      catScored.forEach(({ col: catCol }) => {
        const key = JSON.stringify({ g: [catCol.name], y: null, agg: 'count' });
        if (inUse.has(key)) return;
        sugg.push({ id: 's' + sugg.length, label: `Count by ${catCol.name}`, payload: { type: 'bar', groups: [catCol.name], y: null, agg: 'count', title: `Row count by ${catCol.name}` } });
      });
      state.suggestions = sugg.slice(0, 20);
    }

    // ============================================================
    // Filters (global)
    // ============================================================
    function filterRow(row, f) {
      const raw = row[f.column];
      const v = coerce(raw, f.type);
      const isEmpty = (v == null);
      if (f.op === 'empty') return isEmpty;
      if (f.op === 'notempty') return !isEmpty;
      if (isEmpty) return false;
      if (f.type === 'string' || f.type === 'boolean') {
        const s = String(v);
        const t = f.value != null ? String(f.value) : '';
        if (f.op === 'eq') return s === t;
        if (f.op === 'neq') return s !== t;
        if (f.op === 'contains') return s.toLowerCase().includes(t.toLowerCase());
        if (f.op === 'search') return matchCompiledQuery(state.rows.indexOf(row), f.compiledQuery);
      }
      if (f.type === 'number') {
        const n = v;
        const t = Number(f.value);
        if (f.op === 'eq') return n === t;
        if (f.op === 'neq') return n !== t;
        if (f.op === 'gt') return n > t;
        if (f.op === 'lt') return n < t;
        if (f.op === 'gte') return n >= t;
        if (f.op === 'lte') return n <= t;
      }
      if (f.type === 'date') {
        const d = v;
        if (f.op === 'before') return d < Date.parse(f.value);
        if (f.op === 'after') return d > Date.parse(f.value);
        if (f.op === 'eq') return new Date(d).toDateString() === new Date(Date.parse(f.value)).toDateString();
      }
      // Special: saved-search filter type
      if (f.type === 'search' && f.compiledQuery) {
        // applied below via fast path; should not reach here, but fallback
        return false;
      }
      return false;
    }

    function applyFilters(rows) {
      if (state.filters.length === 0) return rows;
      const mode = state.filterMode;
      // Pre-extract compiled search filters for speed
      const searchFilters = state.filters.filter(f => f.type === 'search' && f.compiledQuery);
      const otherFilters = state.filters.filter(f => f.type !== 'search');
      return rows.filter(r => {
        const checks = [];
        for (const f of otherFilters) checks.push(filterRow(r, f));
        for (const f of searchFilters) checks.push(matchCompiledQuery(state.rows.indexOf(r), f.compiledQuery));
        if (mode === 'and') return checks.every(Boolean);
        return checks.some(Boolean);
      });
    }

    function getFilteredRows() {
      const key = JSON.stringify(state.filters.map(f => ({ c:f.column, o:f.op, v:f.value, q:f.queryStr, t:f.type }))) + '|' + state.filterMode;
      if (state.filteredCacheKey === key && state.filteredCache) return state.filteredCache;
      const rows = applyFilters(state.rows);
      state.filteredCache = rows;
      state.filteredCacheKey = key;
      return rows;
    }
    function invalidateFilterCache() { state.filteredCache = null; state.filteredCacheKey = null; }

    // ============================================================
    // Boolean search parser
    // Grammar:
    //   expr   = orExpr
    //   orExpr = andExpr ('OR' andExpr)*
    //   andExpr= notExpr ('AND'? notExpr)*
    //   notExpr= 'NOT' atom | '-' atom | atom
    //   atom   = '(' expr ')' | term
    //   term   = field ':' value | value
    //   value  = '"phrase"' | bareword
    // Operators are case-sensitive: AND, OR, NOT. Also &&, ||, !
    // Implicit AND when terms are adjacent.
    // ============================================================
    function tokenizeQuery(q) {
      const tokens = [];
      let i = 0;
      const n = q.length;
      while (i < n) {
        const ch = q[i];
        if (ch === ' ' || ch === '\t' || ch === '\n') { i++; continue; }
        if (ch === '(') { tokens.push({ kind:'lp' }); i++; continue; }
        if (ch === ')') { tokens.push({ kind:'rp' }); i++; continue; }
        if (ch === '-' && (i === 0 || ' \t(\n'.includes(q[i-1]))) { tokens.push({ kind:'not' }); i++; continue; }
        if (ch === '!' && q[i+1] !== '=' ) { tokens.push({ kind:'not' }); i++; continue; }
        if (q.startsWith('&&', i)) { tokens.push({ kind:'and' }); i+=2; continue; }
        if (q.startsWith('||', i)) { tokens.push({ kind:'or' }); i+=2; continue; }
        // Word boundary keyword check
        if (q.startsWith('AND', i) && !isWordChar(q[i+3])) { tokens.push({ kind:'and' }); i+=3; continue; }
        if (q.startsWith('OR',  i) && !isWordChar(q[i+2])) { tokens.push({ kind:'or'  }); i+=2; continue; }
        if (q.startsWith('NOT', i) && !isWordChar(q[i+3])) { tokens.push({ kind:'not' }); i+=3; continue; }
        if (ch === '"') {
          const end = q.indexOf('"', i+1);
          const text = end === -1 ? q.slice(i+1) : q.slice(i+1, end);
          tokens.push({ kind:'term', value: text, phrase: true });
          i = end === -1 ? n : end + 1;
          continue;
        }
        // bareword or field:value
        let j = i;
        while (j < n && !' \t\n()'.includes(q[j])) j++;
        const raw = q.slice(i, j);
        const colonIdx = raw.indexOf(':');
        if (colonIdx > 0) {
          const field = raw.slice(0, colonIdx);
          let val = raw.slice(colonIdx + 1);
          let phrase = false;
          if (val.startsWith('"')) {
            // Try to extend through whitespace if quote not yet closed
            const startAbsolute = i + colonIdx + 1;
            const end = q.indexOf('"', startAbsolute + 1);
            if (end !== -1) {
              val = q.slice(startAbsolute + 1, end);
              phrase = true;
              j = end + 1;
            } else {
              val = val.slice(1);
            }
          }
          tokens.push({ kind:'term', field, value: val, phrase });
          i = j;
          continue;
        }
        tokens.push({ kind:'term', value: raw });
        i = j;
      }
      return tokens;
    }
    function isWordChar(c) { return c && /[A-Za-z0-9_]/.test(c); }

    function parseQuery(q) {
      if (!q || !q.trim()) return { ast: null, errors: [], warnings: [] };
      const tokens = tokenizeQuery(q);
      let pos = 0;
      const errors = [];
      const warnings = [];

      function peek() { return tokens[pos]; }
      function consume() { return tokens[pos++]; }

      function parseExpr() { return parseOr(); }
      function parseOr() {
        let left = parseAnd();
        while (peek() && peek().kind === 'or') { consume(); const right = parseAnd(); if (right) left = { kind:'or', left, right }; }
        return left;
      }
      function parseAnd() {
        let left = parseNot();
        while (peek() && peek().kind !== 'or' && peek().kind !== 'rp') {
          if (peek().kind === 'and') consume();
          const right = parseNot();
          if (right) left = { kind:'and', left, right };
          else break;
        }
        return left;
      }
      function parseNot() {
        if (peek() && peek().kind === 'not') { consume(); const a = parseAtom(); return a ? { kind:'not', expr: a } : null; }
        return parseAtom();
      }
      function parseAtom() {
        const t = peek();
        if (!t) return null;
        if (t.kind === 'lp') {
          consume();
          const e = parseExpr();
          if (!peek() || peek().kind !== 'rp') warnings.push('Unmatched parenthesis');
          else consume();
          return e;
        }
        if (t.kind === 'term') { consume(); return { kind:'term', field: t.field || null, value: String(t.value).toLowerCase(), phrase: !!t.phrase }; }
        // Unexpected token
        errors.push(`Unexpected token: ${t.kind}`);
        consume();
        return null;
      }

      const ast = parseExpr();
      if (peek() && peek().kind === 'rp') warnings.push('Stray closing parenthesis');
      if (!ast && tokens.length) errors.push('Could not parse query');
      return { ast, errors, warnings };
    }

    function compileAst(ast) {
      // Returns a function: (rowIndex) => boolean
      if (!ast) return () => true;
      if (ast.kind === 'and') {
        const a = compileAst(ast.left), b = compileAst(ast.right);
        return i => a(i) && b(i);
      }
      if (ast.kind === 'or') {
        const a = compileAst(ast.left), b = compileAst(ast.right);
        return i => a(i) || b(i);
      }
      if (ast.kind === 'not') {
        const a = compileAst(ast.expr);
        return i => !a(i);
      }
      if (ast.kind === 'term') {
        const v = ast.value;
        if (ast.field) {
          const fieldLc = ast.field.toLowerCase();
          return i => {
            const idx = state.rowFieldIndex[i];
            if (!idx) return false;
            const fv = idx[fieldLc];
            return fv != null && fv.includes(v);
          };
        }
        return i => {
          const h = state.rowHaystacks[i];
          return h != null && h.includes(v);
        };
      }
      return () => true;
    }

    function compileQuery(q) {
      // If query has no boolean operators, parentheses, or colons, treat as plain substring across all columns (fast path)
      if (!q || !q.trim()) return { matcher: () => true, errors: [], warnings: [], plain: true };
      const hasBool = /(\bAND\b|\bOR\b|\bNOT\b|&&|\|\||[()"])/.test(q) || q.includes(':') || /(^|\s)-\S/.test(q);
      if (!hasBool) {
        const lc = q.toLowerCase();
        return { matcher: i => state.rowHaystacks[i].includes(lc), errors: [], warnings: [], plain: true };
      }
      const { ast, errors, warnings } = parseQuery(q);
      const matcher = compileAst(ast);
      return { matcher, errors, warnings, plain: false };
    }

    function matchCompiledQuery(rowIndex, compiled) {
      if (rowIndex == null || rowIndex < 0) return false;
      return compiled.matcher(rowIndex);
    }

    // ============================================================
    // KPI computation
    // ============================================================
    function computeKpi(kpi, rows) {
      if (kpi.type === 'count') return { value: rows.length, display: fmtInt(rows.length) };
      const col = state.columns.find(c => c.name === kpi.column);
      if (!col) return { value: null, display: '—' };

      if (kpi.type === 'topn') {
        const freq = new Map();
        for (let i = 0; i < rows.length; i++) {
          const v = rows[i][kpi.column];
          if (v == null || v === '') continue;
          const s = String(v);
          freq.set(s, (freq.get(s) || 0) + 1);
        }
        const top = Array.from(freq.entries()).sort((a,b) => b[1] - a[1]).slice(0, kpi.n || TOPN_DEFAULT);
        return { topList: top, totalDistinct: freq.size };
      }

      const vals = rows.map(r => coerce(r[kpi.column], col.type)).filter(v => v != null);
      if (kpi.type === 'sum') return { value: vals.reduce((a,b)=>a+b,0), display: fmtNumber(vals.reduce((a,b)=>a+b,0)) };
      if (kpi.type === 'avg') return { value: vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null, display: fmtNumber(vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null) };
      if (kpi.type === 'min') return { value: vals.length ? Math.min(...vals) : null, display: fmtNumber(vals.length ? Math.min(...vals) : null) };
      if (kpi.type === 'max') return { value: vals.length ? Math.max(...vals) : null, display: fmtNumber(vals.length ? Math.max(...vals) : null) };
      if (kpi.type === 'distinct') {
        const set = new Set(vals.map(v => String(v)));
        return { value: set.size, display: fmtInt(set.size), sub: 'unique values' };
      }
      if (kpi.type === 'span') {
        if (!vals.length) return { value: null, display: '—' };
        const min = Math.min(...vals), max = Math.max(...vals);
        const days = Math.round((max - min) / 86400000);
        return { value: days, display: `${fmtDate(min)} – ${fmtDate(max)}`, sub: `${days.toLocaleString()} day${days===1?'':'s'}` };
      }
      return { value: null, display: '—' };
    }

    // ============================================================
    // Filter bar
    // ============================================================
    function renderFilterBar() {
      const bar = $('rl-filterbar');
      bar.innerHTML = '';
      bar.appendChild(el('span', { class: 'rl-filterbar-label' }, 'Filters:'));

      state.filters.forEach(f => {
        let txt;
        if (f.type === 'search') {
          txt = `search: ${f.queryStr.length > 30 ? f.queryStr.slice(0,30) + '…' : f.queryStr}`;
        } else {
          txt = `${f.column} ${f.op} ${f.value != null ? f.value : ''}`.trim();
        }
        const chip = el('span', { class: 'rl-chip', title: f.queryStr || txt }, txt, el('span', { class: 'rl-x', title: 'Remove' }, '×'));
        chip.querySelector('.rl-x').addEventListener('click', () => {
          state.filters = state.filters.filter(x => x.id !== f.id);
          invalidateFilterCache();
          renderAll();
        });
        bar.appendChild(chip);
      });

      const addBtn = el('button', { class: 'rl-btn ghost small' }, '+ Add filter');
      addBtn.addEventListener('click', e => openFilterPopover(e.target));
      bar.appendChild(addBtn);

      if (state.filters.length > 1) {
        const mode = el('div', { class: 'rl-filter-mode' });
        ['and','or'].forEach(m => {
          const b = el('button', { 'data-mode': m, class: m === state.filterMode ? 'active' : '' }, m.toUpperCase());
          b.addEventListener('click', () => { state.filterMode = m; invalidateFilterCache(); renderAll(); });
          mode.appendChild(b);
        });
        bar.appendChild(mode);
      }

      const filtered = getFilteredRows();
      const total = state.rows.length;
      const summary = el('span', { class: 'rl-summary' });
      if (state.filters.length === 0) summary.innerHTML = `<strong>${total.toLocaleString()}</strong> rows`;
      else summary.innerHTML = `<strong>${filtered.length.toLocaleString()}</strong> of ${total.toLocaleString()} rows`;
      bar.appendChild(summary);
    }

    function openFilterPopover(anchor) {
      closeAllPopovers();
      const rect = anchor.getBoundingClientRect();
      const pop = el('div', { class: 'rl-popover', id: 'rl-active-popover' });
      pop.style.left = (window.scrollX + rect.left) + 'px';
      pop.style.top = (window.scrollY + rect.bottom + 4) + 'px';

      const colSel = el('select');
      state.columns.forEach(c => colSel.appendChild(el('option', { value: c.name }, `${c.name} (${c.type})`)));
      const opSel = el('select');
      const valInp = el('input', { placeholder: 'value' });

      const OPS = {
        string: [['eq','equals'],['neq','not equals'],['contains','contains'],['empty','is empty'],['notempty','is not empty']],
        number: [['eq','='],['neq','≠'],['gt','>'],['lt','<'],['gte','≥'],['lte','≤'],['empty','is empty']],
        date:   [['eq','on'],['before','before'],['after','after'],['empty','is empty']],
        boolean:[['eq','equals'],['empty','is empty']]
      };
      function refreshOps() {
        const col = state.columns.find(c => c.name === colSel.value);
        opSel.innerHTML = '';
        (OPS[col.type] || OPS.string).forEach(([code,label]) => opSel.appendChild(el('option', { value: code }, label)));
        if (col.type === 'date') valInp.type = 'date'; else valInp.type = 'text';
      }
      refreshOps();
      colSel.addEventListener('change', refreshOps);

      const okBtn = el('button', { class: 'rl-btn small' }, 'Add');
      const cancelBtn = el('button', { class: 'rl-btn ghost small' }, 'Cancel');
      okBtn.addEventListener('click', () => {
        const col = state.columns.find(c => c.name === colSel.value);
        const op = opSel.value;
        const needsVal = !['empty','notempty'].includes(op);
        const value = needsVal ? valInp.value : null;
        state.filters.push({ id: state.nextFilterId++, column: colSel.value, type: col.type, op, value });
        invalidateFilterCache();
        closeAllPopovers();
        renderAll();
      });
      cancelBtn.addEventListener('click', closeAllPopovers);

      pop.appendChild(el('label', { style:'font-size:.74rem;color:var(--rl-text-dim);text-transform:uppercase;letter-spacing:.04em' }, 'Add filter'));
      pop.appendChild(colSel);
      pop.appendChild(opSel);
      pop.appendChild(valInp);
      const actions = el('div', { class: 'rl-popover-actions' });
      actions.appendChild(cancelBtn);
      actions.appendChild(okBtn);
      pop.appendChild(actions);

      document.body.appendChild(pop);
      setTimeout(() => document.addEventListener('click', popoverDismiss, { once: true }), 0);
    }
    function popoverDismiss(e) {
      const p = $('rl-active-popover');
      if (p && !p.contains(e.target)) closeAllPopovers();
      else if (p) document.addEventListener('click', popoverDismiss, { once: true });
    }
    function closeAllPopovers() {
      const p = $('rl-active-popover');
      if (p) p.remove();
    }

    // ============================================================
    // KPI rendering
    // ============================================================
    function renderKpis() {
      const host = $('rl-kpi-grid');
      host.innerHTML = '';
      const rows = getFilteredRows();
      state.kpis.forEach(kpi => {
        const computed = computeKpi(kpi, rows);
        const card = el('div', { class: 'rl-kpi' });
        const remove = el('button', { class: 'rl-kpi-remove', title: 'Remove KPI' }, '×');
        remove.addEventListener('click', () => { state.kpis = state.kpis.filter(k => k.id !== kpi.id); renderKpis(); });
        card.appendChild(remove);
        card.appendChild(el('div', { class: 'rl-kpi-label' }, kpi.label || kpi.type));

        if (kpi.type === 'topn') {
          const list = el('div', { class: 'rl-kpi-list' });
          if (!computed.topList || computed.topList.length === 0) {
            list.appendChild(el('div', { style:'color:var(--rl-text-faint);font-size:.82rem' }, 'No values'));
          } else {
            computed.topList.forEach((entry, idx) => {
              const row = el('div', { class: 'rl-kpi-list-row', title: `Click to filter ${kpi.column} = ${entry[0]}` });
              row.appendChild(el('span', { class: 'rl-kpi-list-rank' }, String(idx + 1)));
              row.appendChild(el('span', { class: 'rl-kpi-list-name', title: entry[0] }, entry[0]));
              row.appendChild(el('span', { class: 'rl-kpi-list-count' }, fmtInt(entry[1])));
              row.addEventListener('click', () => {
                const col = state.columns.find(c => c.name === kpi.column);
                if (!col) return;
                const dup = state.filters.find(f => f.column === kpi.column && f.op === 'eq' && String(f.value) === entry[0]);
                if (dup) state.filters = state.filters.filter(f => f.id !== dup.id);
                else state.filters.push({ id: state.nextFilterId++, column: kpi.column, type: col.type, op: 'eq', value: entry[0] });
                invalidateFilterCache();
                renderAll();
              });
              list.appendChild(row);
            });
          }
          card.appendChild(list);
          if (computed.totalDistinct > (kpi.n || TOPN_DEFAULT)) card.appendChild(el('div', { class: 'rl-kpi-sub' }, `top ${kpi.n || TOPN_DEFAULT} of ${computed.totalDistinct}`));
          else card.appendChild(el('div', { class: 'rl-kpi-sub' }, `${computed.totalDistinct} unique`));
        } else {
          card.appendChild(el('div', { class: 'rl-kpi-value' }, computed.display));
          if (computed.sub) card.appendChild(el('div', { class: 'rl-kpi-sub' }, computed.sub));
          else if (kpi.type !== 'count' && kpi.type !== 'span') card.appendChild(el('div', { class: 'rl-kpi-sub' }, kpi.type));
        }
        host.appendChild(card);
      });

      if (state.kpis.length < MAX_KPIS) {
        const add = el('button', { class: 'rl-kpi-add' }, '+ Add KPI');
        add.addEventListener('click', e => openKpiPopover(e.target));
        host.appendChild(add);
      }
    }

    function openKpiPopover(anchor) {
      closeAllPopovers();
      const rect = anchor.getBoundingClientRect();
      const pop = el('div', { class: 'rl-popover', id: 'rl-active-popover' });
      pop.style.left = (window.scrollX + rect.left) + 'px';
      pop.style.top = (window.scrollY + rect.bottom + 4) + 'px';

      const typeSel = el('select');
      [['count','Row count'],['sum','Sum'],['avg','Average'],['min','Min'],['max','Max'],['distinct','Distinct count'],['span','Date span'],['topn','Top values (by count)']]
        .forEach(([v,l]) => typeSel.appendChild(el('option', { value: v }, l)));
      const colSel = el('select');
      const nInp = el('input', { type:'number', min:'1', max:'20', value:'5', placeholder:'how many', style:'display:none' });

      function refreshCols() {
        colSel.innerHTML = '';
        const t = typeSel.value;
        nInp.style.display = (t === 'topn') ? '' : 'none';
        if (t === 'count') { colSel.appendChild(el('option', { value: '' }, '(all rows)')); colSel.disabled = true; }
        else if (t === 'span') { colSel.disabled = false; state.columns.filter(c => c.type === 'date').forEach(c => colSel.appendChild(el('option', { value: c.name }, c.name))); }
        else if (t === 'distinct' || t === 'topn') { colSel.disabled = false; state.columns.forEach(c => colSel.appendChild(el('option', { value: c.name }, c.name))); }
        else { colSel.disabled = false; state.columns.filter(c => c.type === 'number').forEach(c => colSel.appendChild(el('option', { value: c.name }, c.name))); }
      }
      typeSel.addEventListener('change', refreshCols);
      refreshCols();

      const okBtn = el('button', { class: 'rl-btn small' }, 'Add');
      const cancelBtn = el('button', { class: 'rl-btn ghost small' }, 'Cancel');
      okBtn.addEventListener('click', () => {
        const t = typeSel.value;
        const col = t === 'count' ? null : colSel.value;
        if (t !== 'count' && !col) { toast('Pick a column.', 'err'); return; }
        const label = t === 'count' ? 'Rows' : (t === 'topn' ? `Top by ${col}` : col);
        const kpi = { id: state.nextKpiId++, type: t, column: col, label };
        if (t === 'topn') { const n = parseInt(nInp.value, 10); kpi.n = Number.isFinite(n) && n > 0 && n <= 20 ? n : TOPN_DEFAULT; }
        state.kpis.push(kpi);
        closeAllPopovers();
        renderKpis();
      });
      cancelBtn.addEventListener('click', closeAllPopovers);

      pop.appendChild(el('label', { style:'font-size:.74rem;color:var(--rl-text-dim);text-transform:uppercase;letter-spacing:.04em' }, 'Add KPI'));
      pop.appendChild(typeSel);
      pop.appendChild(colSel);
      pop.appendChild(nInp);
      const actions = el('div', { class: 'rl-popover-actions' });
      actions.appendChild(cancelBtn);
      actions.appendChild(okBtn);
      pop.appendChild(actions);
      document.body.appendChild(pop);
      setTimeout(() => document.addEventListener('click', popoverDismiss, { once: true }), 0);
    }

    // ============================================================
    // Charts
    // ============================================================
    const CHART_TYPES = [['bar','Bar'],['line','Line'],['pie','Pie']];
    const AGGS = [['count','Count'],['sum','Sum'],['avg','Average'],['min','Min'],['max','Max']];

    function destroyChart(c) { if (c._instance) { try { c._instance.destroy(); } catch(e){} c._instance = null; } }
    function destroyAllCharts() { state.charts.forEach(destroyChart); }

    function renderCharts() {
      const host = $('rl-chart-grid');
      host.innerHTML = '';
      state.charts.forEach(c => host.appendChild(buildChartCard(c)));
      const add = el('button', { class: 'rl-chart-add' }, '+ Add chart');
      add.addEventListener('click', () => {
        const numCol = state.columns.find(c => c.type === 'number' && !isIdLike(c.name));
        const catCol = state.columns.find(c => (c.type === 'string' || c.type === 'boolean') && !isIdLike(c.name));
        state.charts.push({ id: state.nextChartId++, type: 'bar', groups: catCol ? [catCol.name] : (state.columns[0] ? [state.columns[0].name] : []), y: numCol ? numCol.name : null, agg: numCol ? 'sum' : 'count', title: 'New chart', optionsOpen: true });
        renderCharts();
      });
      host.appendChild(add);
    }

    function buildChartCard(chart) {
      const card = el('div', { class: 'rl-chart-card' });
      const header = el('div', { class: 'rl-chart-header' });
      const title = el('input', { type: 'text', class: 'rl-chart-title', value: chart.title || 'Chart' });
      title.addEventListener('change', e => { chart.title = e.target.value; });
      header.appendChild(title);
      const actions = el('div', { class: 'rl-chart-actions' });
      const optBtn = el('button', { class: 'rl-btn ghost small', title: 'Options' }, '⚙');
      optBtn.addEventListener('click', () => { chart.optionsOpen = !chart.optionsOpen; renderCharts(); });
      const delBtn = el('button', { class: 'rl-btn ghost small', title: 'Remove' }, '×');
      delBtn.addEventListener('click', () => { destroyChart(chart); state.charts = state.charts.filter(c => c.id !== chart.id); renderCharts(); });
      actions.appendChild(optBtn); actions.appendChild(delBtn);
      header.appendChild(actions);
      card.appendChild(header);

      const opts = el('div', { class: 'rl-chart-options' + (chart.optionsOpen ? ' open' : '') });
      const typeSel = el('select');
      CHART_TYPES.forEach(([v,l]) => { const o = el('option', { value: v }, l); if (v === chart.type) o.selected = true; typeSel.appendChild(o); });
      opts.appendChild(el('label', {}, 'Type')); opts.appendChild(typeSel);
      opts.appendChild(el('label', {}, 'Group by'));
      const groupChips = el('span', { style:'display:flex;gap:4px;flex-wrap:wrap;align-items:center' });
      chart.groups.forEach((g, idx) => {
        const chip = el('span', { class: 'rl-chip' }, g, el('span', { class: 'rl-x' }, '×'));
        chip.querySelector('.rl-x').addEventListener('click', () => { chart.groups.splice(idx,1); renderCharts(); });
        groupChips.appendChild(chip);
      });
      const maxG = (chart.type === 'pie') ? 1 : MAX_GROUPS;
      if (chart.groups.length < maxG) {
        const addSel = el('select');
        addSel.appendChild(el('option', { value: '' }, chart.groups.length ? '+ add' : 'pick column'));
        state.columns.filter(c => !chart.groups.includes(c.name)).forEach(c => addSel.appendChild(el('option', { value: c.name }, c.name)));
        addSel.addEventListener('change', e => { if (e.target.value) { chart.groups.push(e.target.value); renderCharts(); } });
        groupChips.appendChild(addSel);
      }
      opts.appendChild(groupChips);
      const aggSel = el('select');
      AGGS.forEach(([v,l]) => { const o = el('option', { value: v }, l); if (v === chart.agg) o.selected = true; aggSel.appendChild(o); });
      opts.appendChild(el('label', {}, 'Aggregate')); opts.appendChild(aggSel);
      const ySel = el('select');
      ySel.appendChild(el('option', { value: '' }, '—'));
      state.columns.filter(c => c.type === 'number').forEach(c => { const o = el('option', { value: c.name }, c.name); if (c.name === chart.y) o.selected = true; ySel.appendChild(o); });
      opts.appendChild(el('label', {}, 'Value')); opts.appendChild(ySel);
      [typeSel, aggSel, ySel].forEach(s => s.addEventListener('change', () => {
        chart.type = typeSel.value; chart.agg = aggSel.value; chart.y = ySel.value || null;
        if (chart.type === 'pie' && chart.groups.length > 1) chart.groups = chart.groups.slice(0,1);
        renderCharts();
      }));
      card.appendChild(opts);

      const body = el('div', { class: 'rl-chart-body' });
      const canvas = el('canvas');
      body.appendChild(canvas);
      card.appendChild(body);
      const meta = el('div', { class: 'rl-chart-meta' });
      const metaTxt = el('span');
      meta.appendChild(metaTxt);
      meta.appendChild(el('span', { class: 'rl-drill-hint' }, 'click a bar/slice to filter'));
      card.appendChild(meta);

      const sourceRows = getFilteredRows();
      if (!sourceRows.length || chart.groups.length === 0) {
        body.innerHTML = '<div class="rl-chart-empty">Pick at least one group column.</div>';
        metaTxt.textContent = '';
        return card;
      }
      try {
        const built = buildChartData(sourceRows, chart);
        if (!built || (built.labels && !built.labels.length)) { body.innerHTML = '<div class="rl-chart-empty">Nothing to plot.</div>'; return card; }
        const ctx = canvas.getContext('2d');
        const palette = ['#6b4eff','#2563eb','#16a34a','#d97706','#dc2626','#0891b2','#7c3aed','#db2777','#65a30d','#ea580c','#0ea5e9','#84cc16'];
        let config;
        if (built.datasets) {
          config = { type: chart.type === 'pie' ? 'pie' : chart.type, data: { labels: built.labels, datasets: built.datasets.map((ds, i) => ({ label: ds.label, data: ds.values, backgroundColor: palette[i % palette.length], borderColor: palette[i % palette.length], borderWidth: chart.type === 'line' ? 2 : 1, fill: chart.type === 'line' ? false : true, stack: chart.type === 'bar' ? 'stack0' : undefined })) }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: built.datasets.length > 1 || chart.type === 'pie' } }, scales: chart.type === 'bar' ? { x: { stacked: true }, y: { stacked: true } } : {}, onClick: (evt, items) => handleChartClick(chart, evt, items, built) } };
        } else {
          config = { type: chart.type, data: { labels: built.labels, datasets: [{ label: built.datasetLabel, data: built.values, backgroundColor: chart.type === 'pie' ? palette : palette[0], borderColor: palette[0], borderWidth: chart.type === 'line' ? 2 : 1, fill: chart.type === 'line' ? false : true }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: chart.type === 'pie' } }, onClick: (evt, items) => handleChartClick(chart, evt, items, built) } };
        }
        if (chart._instance) chart._instance.destroy();
        chart._instance = new Chart(ctx, config);
        let txt = `${sourceRows.length.toLocaleString()} row${sourceRows.length===1?'':'s'}`;
        if (state.filters.length) txt += ` · filtered from ${state.rows.length.toLocaleString()}`;
        if (built.warning) txt += ` · ⚠ ${built.warning}`;
        metaTxt.textContent = txt;
      } catch (e) { body.innerHTML = `<div class="rl-chart-empty">Chart error: ${escapeHtml(e.message)}</div>`; }
      return card;
    }

    function handleChartClick(chart, evt, items, built) {
      if (!items || !items.length) return;
      const idx = items[0].index;
      const label = built.labels[idx];
      if (label == null) return;
      const groupCol = chart.groups[0];
      const col = state.columns.find(c => c.name === groupCol);
      if (!col) return;
      const value = String(label).split(' · ')[0];
      const dup = state.filters.find(f => f.column === groupCol && f.op === 'eq' && String(f.value) === value);
      if (dup) { state.filters = state.filters.filter(f => f.id !== dup.id); toast(`Removed filter: ${groupCol} = ${value}`, 'ok'); }
      else { state.filters.push({ id: state.nextFilterId++, column: groupCol, type: col.type, op: 'eq', value }); toast(`Filtered: ${groupCol} = ${value}`, 'ok'); }
      invalidateFilterCache();
      renderAll();
    }

    function buildChartData(rows, chart) {
      const yCol = chart.y ? state.columns.find(c => c.name === chart.y) : null;
      const agg = chart.agg;
      const reduce = arr => { if (!arr.length) return 0; if (agg === 'count' || !yCol) return arr.length; if (agg === 'sum') return arr.reduce((a,b)=>a+b,0); if (agg === 'avg') return arr.reduce((a,b)=>a+b,0)/arr.length; if (agg === 'min') return Math.min(...arr); if (agg === 'max') return Math.max(...arr); return arr.length; };
      const valueFor = r => agg === 'count' || !yCol ? 1 : coerce(r[yCol.name], yCol.type);
      const keyOf = (r, colName) => {
        const col = state.columns.find(c => c.name === colName);
        const v = r[colName];
        if (v == null || v === '') return '(empty)';
        if (col && col.type === 'date') { const d = coerce(v, 'date'); if (d == null) return '(empty)'; const dt = new Date(d); return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0'); }
        return String(v);
      };
      if (chart.groups.length === 1) {
        const g = chart.groups[0];
        const groups = new Map();
        rows.forEach(r => { const k = keyOf(r, g); if (!groups.has(k)) groups.set(k, []); const v = valueFor(r); if (v != null) groups.get(k).push(v); });
        const col = state.columns.find(c => c.name === g);
        const isDate = col && col.type === 'date';
        const pairs = Array.from(groups.entries()).map(([k, arr]) => [k, reduce(arr)]);
        if (isDate) pairs.sort((a,b) => a[0].localeCompare(b[0])); else pairs.sort((a,b) => b[1] - a[1]);
        const top = pairs.slice(0, 50);
        return { labels: top.map(p => p[0]), values: top.map(p => p[1]), datasetLabel: agg === 'count' ? `count by ${g}` : `${agg}(${chart.y || ''}) by ${g}`, warning: pairs.length > 50 ? `${pairs.length} groups — showing top 50` : null };
      }
      const primary = chart.groups.slice(0, -1);
      const stackBy = chart.groups[chart.groups.length - 1];
      const xKeys = new Set(), stackKeys = new Set();
      const cells = new Map();
      rows.forEach(r => { const xK = primary.map(g => keyOf(r, g)).join(' · '); const sK = keyOf(r, stackBy); xKeys.add(xK); stackKeys.add(sK); const ck = xK + '||' + sK; if (!cells.has(ck)) cells.set(ck, []); const v = valueFor(r); if (v != null) cells.get(ck).push(v); });
      const xTotals = new Map();
      xKeys.forEach(xk => { let t = 0; stackKeys.forEach(sk => { t += reduce(cells.get(xk + '||' + sk) || []) || 0; }); xTotals.set(xk, t); });
      const sortedX = Array.from(xKeys).sort((a,b) => xTotals.get(b) - xTotals.get(a)).slice(0, 30);
      const stTotals = new Map();
      stackKeys.forEach(sk => { let t = 0; sortedX.forEach(xk => { t += reduce(cells.get(xk + '||' + sk) || []) || 0; }); stTotals.set(sk, t); });
      const sortedSt = Array.from(stackKeys).sort((a,b) => stTotals.get(b) - stTotals.get(a)).slice(0, 12);
      const datasets = sortedSt.map(sk => ({ label: sk, values: sortedX.map(xk => { const a = cells.get(xk + '||' + sk) || []; return a.length ? reduce(a) : 0; }) }));
      let warning = null;
      if (xKeys.size > 30) warning = `${xKeys.size} groups — showing top 30`;
      else if (stackKeys.size > 12) warning = `${stackKeys.size} series — showing top 12`;
      return { labels: sortedX, datasets, warning };
    }

    // ============================================================
    // Suggestions
    // ============================================================
    function renderSuggestions() {
      const sug = $('rl-suggest');
      const body = $('rl-suggest-body');
      const count = $('rl-suggest-count');
      sug.classList.toggle('open', state.suggestOpen);
      count.textContent = state.suggestions.length ? `${state.suggestions.length} available` : '';
      body.innerHTML = '';
      state.suggestions.forEach(s => {
        const chip = el('span', { class: 'rl-suggest-chip' }, el('span', { class: 'rl-plus' }, '+'), s.label);
        chip.addEventListener('click', () => {
          state.charts.push({ ...s.payload, id: state.nextChartId++, optionsOpen: false });
          state.suggestions = state.suggestions.filter(x => x.id !== s.id);
          renderCharts(); renderSuggestions();
          toast('Added: ' + s.label, 'ok');
        });
        body.appendChild(chip);
      });
    }

    // ============================================================
    // Table views — multi-view rendering
    // ============================================================
    function generateSearchExamples() {
      // Returns array of strings: real example queries based on data.
      const examples = [];
      if (!state.rows.length || !state.columns.length) return examples;

      // Pick the lowest-cardinality non-id categorical with at least 2 values
      const cats = state.columns
        .filter(c => (c.type === 'string' || c.type === 'boolean') && !isIdLike(c.name))
        .map(c => ({ col: c, card: cardinality(c.name) }))
        .filter(x => x.card >= 2 && x.card <= 50)
        .sort((a,b) => a.card - b.card);

      // Helper: top values for a column
      const topValues = (colName, n) => {
        const freq = new Map();
        for (let i = 0; i < state.rows.length; i++) {
          const v = state.rows[i][colName];
          if (v == null || v === '') continue;
          const s = String(v);
          freq.set(s, (freq.get(s) || 0) + 1);
        }
        return Array.from(freq.entries()).sort((a,b) => b[1] - a[1]).slice(0, n).map(p => p[0]);
      };

      // Example 1: plain word — pick a frequent value from the first low-cardinality column
      if (cats.length) {
        const tops = topValues(cats[0].col.name, 2);
        if (tops.length >= 1) {
          const sample = tops[0];
          // If value has spaces, quote it
          examples.push(/\s/.test(sample) ? `"${sample}"` : sample);
        }
      }

      // Example 2: field:value
      if (cats.length) {
        const colName = cats[0].col.name;
        const tops = topValues(colName, 1);
        if (tops.length) {
          const v = tops[0];
          const valTok = /\s/.test(v) ? `"${v}"` : v;
          // Field name with spaces won't work as bareword; users would need to know — skip if so
          if (!/\s/.test(colName)) examples.push(`${colName}:${valTok}`);
        }
      }

      // Example 3: OR — two values from same column
      if (cats.length) {
        const tops = topValues(cats[0].col.name, 2);
        if (tops.length >= 2) {
          const a = /\s/.test(tops[0]) ? `"${tops[0]}"` : tops[0];
          const b = /\s/.test(tops[1]) ? `"${tops[1]}"` : tops[1];
          examples.push(`${a} OR ${b}`);
        }
      }

      // Example 4: grouped — (a OR b) AND something from a second column
      if (cats.length >= 2) {
        const t1 = topValues(cats[0].col.name, 2);
        const t2 = topValues(cats[1].col.name, 1);
        if (t1.length >= 2 && t2.length >= 1) {
          const a = /\s/.test(t1[0]) ? `"${t1[0]}"` : t1[0];
          const b = /\s/.test(t1[1]) ? `"${t1[1]}"` : t1[1];
          const c = /\s/.test(t2[0]) ? `"${t2[0]}"` : t2[0];
          examples.push(`(${a} OR ${b}) AND ${c}`);
        }
      }

      return examples.slice(0, 4);
    }

    function renderTableViews() {
      const host = $('rl-tables-host');
      host.innerHTML = '';
      state.tableViews.forEach(view => host.appendChild(buildTableViewCard(view)));
      if (state.tableViews.length === 0) {
        host.appendChild(el('div', { class: 'rl-add-view' }, '+ Click "New table view" to add a table'));
      }
    }

    function getViewRows(view) {
      // Start from globally filtered rows, then apply view's search and sort.
      let rows = getFilteredRows();
      if (view.search && view.search.trim()) {
        const compiled = view._compiled || compileQuery(view.search);
        view._compiled = compiled;
        view._compileErrors = compiled.errors;
        view._compileWarnings = compiled.warnings;
        rows = rows.filter(r => {
          const idx = state.rows.indexOf(r);
          return idx >= 0 && compiled.matcher(idx);
        });
      } else {
        view._compileErrors = [];
        view._compileWarnings = [];
      }
      // sort
      if (view.sort && view.sort.column) {
        const col = state.columns.find(c => c.name === view.sort.column);
        if (col) {
          const dir = view.sort.dir === 'asc' ? 1 : -1;
          rows = rows.slice().sort((a,b) => {
            const av = coerce(a[col.name], col.type);
            const bv = coerce(b[col.name], col.type);
            if (av == null && bv == null) return 0;
            if (av == null) return 1;
            if (bv == null) return -1;
            if (av < bv) return -dir;
            if (av > bv) return dir;
            return 0;
          });
        }
      }
      return rows;
    }

    function getViewSelectedColumns(view) {
      if (view.selectedColumns instanceof Set) {
        return state.columns.filter(c => view.selectedColumns.has(c.name));
      }
      return state.columns.filter(c => c.selected);
    }

    function buildTableViewCard(view) {
      const card = el('div', { class: 'rl-table-view' + (view.open ? ' open' : '') });

      // Header
      const head = el('div', { class: 'rl-tv-head' });
      head.appendChild(el('span', { class: 'rl-tv-caret' }, '▶'));
      const nameInp = el('input', { type:'text', class: 'rl-tv-name', value: view.name });
      nameInp.addEventListener('click', e => e.stopPropagation());
      nameInp.addEventListener('input', e => { view.name = e.target.value; });
      head.appendChild(nameInp);

      const meta = el('span', { class: 'rl-tv-meta' });
      head.appendChild(meta);

      const tvActions = el('div', { class: 'rl-tv-actions' });
      tvActions.addEventListener('click', e => e.stopPropagation());
      const csvBtn = el('button', { class: 'rl-btn ghost small', title: 'Download CSV of this view' }, 'CSV');
      csvBtn.addEventListener('click', () => exportViewCSV(view));
      const delBtn = el('button', { class: 'rl-btn ghost small', title: 'Remove view' }, '×');
      delBtn.addEventListener('click', () => {
        if (state.tableViews.length === 1) { toast('Cannot remove the last view.', 'err'); return; }
        state.tableViews = state.tableViews.filter(v => v.id !== view.id);
        renderTableViews();
      });
      tvActions.appendChild(csvBtn);
      tvActions.appendChild(delBtn);
      head.appendChild(tvActions);

      head.addEventListener('click', () => { view.open = !view.open; renderTableViews(); });
      card.appendChild(head);

      // Body
      const bodyWrap = el('div', { class: 'rl-tv-body' });

      // Toolbar with search
      const toolbar = el('div', { class: 'rl-tv-toolbar' });

      const searchWrap = el('div', { class: 'rl-search-wrap' });
      const searchInp = el('input', { type:'search', class:'rl-search-input', placeholder:'Search… try: north OR south', value: view.search || '' });
      const statusBadge = el('span', { class: 'rl-search-status' });
      const helpBtn = el('button', { class:'rl-search-help', type:'button', title:'Search help' }, '?');
      searchWrap.appendChild(searchInp);
