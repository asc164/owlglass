      searchWrap.appendChild(statusBadge);
      searchWrap.appendChild(helpBtn);

      // Examples popover
      const examples = generateSearchExamples();
      const exHost = el('div', { class: 'rl-search-examples' });
      if (examples.length) {
        exHost.appendChild(el('span', { class:'rl-ex-label' }, 'Try one of these (click to use):'));
        examples.forEach(ex => {
          const chip = el('span', { class:'rl-search-ex' }, ex);
          chip.addEventListener('click', () => {
            searchInp.value = ex;
            view.search = ex;
            view._compiled = null;
            exHost.classList.remove('show');
            renderTableView(view, card);
          });
          exHost.appendChild(chip);
        });
      }
      searchWrap.appendChild(exHost);

      // Help tip popover
      const tip = el('div', { class:'rl-search-tip' });
      tip.innerHTML = `
        <h4>Search syntax</h4>
        <div class="rl-tip-row"><code>north active</code><span>both words anywhere</span></div>
        <div class="rl-tip-row"><code>north OR south</code><span>either word</span></div>
        <div class="rl-tip-row"><code>(north OR south) AND active</code><span>grouping</span></div>
        <div class="rl-tip-row"><code>NOT closed</code> <code>-closed</code><span>exclude</span></div>
        <div class="rl-tip-row"><code>status:active</code><span>specific column</span></div>
        <div class="rl-tip-row"><code>"new york"</code><span>exact phrase</span></div>
        <div style="margin-top:8px;font-size:.72rem;color:var(--rl-text-dim)">AND/OR/NOT must be UPPERCASE. Searches all columns, including hidden ones.</div>
      `;
      // Make code clickable
      Array.from(tip.querySelectorAll('code')).forEach(c => c.addEventListener('click', () => {
        searchInp.value = c.textContent;
        view.search = c.textContent;
        view._compiled = null;
        tip.classList.remove('show');
        renderTableView(view, card);
      }));
      searchWrap.appendChild(tip);

      helpBtn.addEventListener('click', e => {
        e.stopPropagation();
        tip.classList.toggle('show');
        exHost.classList.remove('show');
      });
      searchInp.addEventListener('focus', () => {
        if (!searchInp.value && examples.length) exHost.classList.add('show');
      });
      searchInp.addEventListener('blur', () => { setTimeout(() => exHost.classList.remove('show'), 200); });

      let typingTimer = null;
      searchInp.addEventListener('input', e => {
        const v = e.target.value;
        view.search = v;
        view._compiled = null;
        // Show examples when empty
        if (!v) { exHost.classList.add('show'); }
        else exHost.classList.remove('show');
        // Live-validate without re-rendering rows yet
        const compiled = compileQuery(v);
        view._compiled = compiled;
        searchInp.classList.remove('rl-q-invalid','rl-q-warn');
        statusBadge.className = 'rl-search-status';
        statusBadge.textContent = '';
        statusBadge.title = '';
        if (v) {
          if (compiled.errors.length) {
            searchInp.classList.add('rl-q-invalid');
            statusBadge.className = 'rl-search-status err';
            statusBadge.textContent = '✕';
            statusBadge.title = compiled.errors.join('; ');
          } else if (compiled.warnings.length) {
            searchInp.classList.add('rl-q-warn');
            statusBadge.className = 'rl-search-status warn';
            statusBadge.textContent = '⚠';
            statusBadge.title = compiled.warnings.join('; ');
          } else {
            statusBadge.className = 'rl-search-status ok';
            statusBadge.textContent = '✓';
            statusBadge.title = compiled.plain ? 'Substring search across all columns' : 'Query is valid';
          }
        }
        // Debounce the actual row rendering
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => renderTableView(view, card), SEARCH_DEBOUNCE_MS);
      });

      // Initial validate
      if (view.search) searchInp.dispatchEvent(new Event('input'));

      toolbar.appendChild(searchWrap);

      // Save search as filter
      const saveBtn = el('button', { class:'rl-btn ghost small', title:'Save current search as a filter chip at the top' }, 'Save as filter');
      saveBtn.addEventListener('click', () => {
        const q = (view.search || '').trim();
        if (!q) { toast('Type a search first.', 'err'); return; }
        const compiled = compileQuery(q);
        if (compiled.errors.length) { toast('Query has errors: ' + compiled.errors.join('; '), 'err'); return; }
        state.filters.push({ id: state.nextFilterId++, type: 'search', op: 'search', column: '*', queryStr: q, compiledQuery: compiled });
        // Clear the view search
        view.search = '';
        view._compiled = null;
        searchInp.value = '';
        invalidateFilterCache();
        toast('Saved as filter.', 'ok');
        renderAll();
      });
      toolbar.appendChild(saveBtn);

      // Columns dropdown (per view)
      const colsDD = el('div', { class: 'rl-cols-dropdown' });
      const colsBtn = el('button', { class:'rl-btn ghost small' }, 'Columns ▾');
      colsBtn.addEventListener('click', e => { e.stopPropagation(); colsDD.classList.toggle('open'); });
      const colsPopup = el('div', { class:'rl-cols-popup' });
      state.columns.forEach(c => {
        const isSel = view.selectedColumns instanceof Set ? view.selectedColumns.has(c.name) : c.selected;
        const row = el('div', { class: 'rl-col-row' });
        const cb = el('input', { type:'checkbox', ...(isSel ? { checked: '' } : {}) });
        cb.addEventListener('change', e => {
          if (!(view.selectedColumns instanceof Set)) {
            view.selectedColumns = new Set(state.columns.filter(x => x.selected).map(x => x.name));
          }
          if (e.target.checked) view.selectedColumns.add(c.name);
          else view.selectedColumns.delete(c.name);
          renderTableView(view, card);
        });
        row.appendChild(cb);
        row.appendChild(document.createTextNode(c.name));
        row.appendChild(el('span', { class:'rl-type' }, c.type));
        row.addEventListener('click', e => {
          if (e.target === cb) return;
          cb.checked = !cb.checked;
          cb.dispatchEvent(new Event('change'));
        });
        colsPopup.appendChild(row);
      });
      colsDD.appendChild(colsBtn);
      colsDD.appendChild(colsPopup);
      toolbar.appendChild(colsDD);
      document.addEventListener('click', e => { if (!colsDD.contains(e.target)) colsDD.classList.remove('open'); });

      const metaSpan = el('span', { style:'font-size:.78rem;color:var(--rl-text-dim);margin-left:auto' });
      toolbar.appendChild(metaSpan);

      bodyWrap.appendChild(toolbar);

      // Table
      const tblWrap = el('div', { class:'rl-table-wrap' });
      const tbl = el('table', { class:'rl-table' });
      const thead = el('thead');
      const headRow = el('tr');
      thead.appendChild(headRow);
      const tbody = el('tbody');
      tbl.appendChild(thead);
      tbl.appendChild(tbody);
      tblWrap.appendChild(tbl);
      bodyWrap.appendChild(tblWrap);

      card.appendChild(bodyWrap);

      // Initial render of rows
      // Use a microtask so the card is in DOM and meta works
      view._refs = { card, headRow, tbody, metaSpan, meta, statusBadge, searchInp };
      renderTableView(view, card);

      return card;
    }

    function renderTableView(view, card) {
      const refs = view._refs;
      if (!refs) return;
      const { headRow, tbody, metaSpan, meta } = refs;
      const rows = getViewRows(view);
      const selCols = getViewSelectedColumns(view);

      // Update header counts
      const filteredTotal = getFilteredRows().length;
      meta.textContent = `${rows.length.toLocaleString()} of ${filteredTotal.toLocaleString()} rows`;
      metaSpan.textContent = view.search
        ? `${rows.length.toLocaleString()} match${rows.length===1?'':'es'}`
        : (rows.length > TABLE_RENDER_CAP ? `Showing first ${TABLE_RENDER_CAP.toLocaleString()} of ${rows.length.toLocaleString()}` : `${rows.length.toLocaleString()} row${rows.length===1?'':'s'}`);

      if (!view.open) return;

      headRow.innerHTML = '';
      tbody.innerHTML = '';

      selCols.forEach(c => {
        const isSorted = view.sort && view.sort.column === c.name;
        const th = el('th', { class: isSorted ? 'sorted' : '' }, c.name, isSorted ? el('span', { class:'rl-sort-ind' }, view.sort.dir === 'asc' ? '▲' : '▼') : null);
        th.addEventListener('click', () => {
          if (!view.sort) view.sort = { column: null, dir: 'asc' };
          if (view.sort.column === c.name) view.sort.dir = view.sort.dir === 'asc' ? 'desc' : 'asc';
          else { view.sort.column = c.name; view.sort.dir = 'asc'; }
          renderTableView(view, card);
        });
        headRow.appendChild(th);
      });

      const cap = Math.min(rows.length, TABLE_RENDER_CAP);
      const frag = document.createDocumentFragment();
      for (let i = 0; i < cap; i++) {
        const row = rows[i];
        const tr = el('tr');
        selCols.forEach(c => {
          const val = row[c.name];
          tr.appendChild(el('td', { title: val == null ? '' : String(val) }, val == null ? '' : String(val)));
        });
        frag.appendChild(tr);
      }
      tbody.appendChild(frag);
    }

    function exportViewCSV(view) {
      const rows = getViewRows(view);
      if (!rows.length) { toast('No rows to export.', 'err'); return; }
      const selCols = getViewSelectedColumns(view).map(c => c.name);
      if (!selCols.length) { toast('No columns selected.', 'err'); return; }
      const data = rows.map(r => { const o = {}; selCols.forEach(c => o[c] = r[c]); return o; });
      const csv = Papa.unparse(data);
      const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const base = (state.rawFileName || 'reportlens').replace(/\.[^.]+$/, '');
      const slug = (view.name || 'view').replace(/[^a-z0-9_-]+/gi, '_').toLowerCase();
      a.href = url; a.download = `${base}_${slug}.csv`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      toast(`Exported ${rows.length.toLocaleString()} rows.`, 'ok');
    }

    // ============================================================
    // Render all
    // ============================================================
    function renderAll() {
      renderFilterBar();
      renderKpis();
      renderCharts();
      renderSuggestions();
      renderTableViews();
    }

    // ============================================================
    // Wire events
    // ============================================================
    function wire() {
      const drop = $('rl-drop');
      const dropFile = $('rl-drop-file');
      drop.addEventListener('click', () => dropFile.click());
      dropFile.addEventListener('change', e => handleFile(e.target.files[0]));
      ['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('dragover'); }));
      ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('dragover'); }));
      drop.addEventListener('drop', e => handleFile(e.dataTransfer.files[0]));

      $('rl-upload-btn').addEventListener('click', () => $('rl-file').click());
      $('rl-file').addEventListener('change', e => handleFile(e.target.files[0]));

      $('rl-clear-all').addEventListener('click', () => {
        if (!confirm('Clear loaded data and start over?')) return;
        destroyAllCharts();
        state.rows = []; state.columns = []; state.filters = []; state.charts = []; state.kpis = []; state.suggestions = []; state.tableViews = [];
        state.rawFileName = null; state.reportTitle = ''; state.notes = '';
        state.sort = { column: null, dir: 'asc' };
        state.rowHaystacks = []; state.rowFieldIndex = [];
        invalidateFilterCache();
        $('rl-dashboard').style.display = 'none';
        $('rl-empty-state').style.display = '';
        $('rl-pdf-btn').disabled = true;
        status('');
        toast('Cleared.', 'ok');
      });

      $('rl-report-title').addEventListener('input', e => { state.reportTitle = e.target.value; });
      $('rl-notes').addEventListener('input', e => { state.notes = e.target.value; });

      $('rl-suggest-head').addEventListener('click', () => { state.suggestOpen = !state.suggestOpen; renderSuggestions(); });

      $('rl-add-table-btn').addEventListener('click', () => {
        state.tableViews.push({
          id: state.nextViewId++,
          name: `View ${state.tableViews.length + 1}`,
          search: '',
          sort: { column: null, dir: 'asc' },
          selectedColumns: null,
          open: true
        });
        renderTableViews();
      });

      $('rl-pdf-btn').addEventListener('click', () => window.print());

      // Dismiss popovers/tips on outside click
      document.addEventListener('click', e => {
        document.querySelectorAll('.rl-search-tip.show').forEach(t => {
          if (!t.parentElement.contains(e.target)) t.classList.remove('show');
        });
        document.querySelectorAll('.rl-search-examples.show').forEach(t => {
          if (!t.parentElement.contains(e.target)) t.classList.remove('show');
        });
      });
    }

    wire();
  })();
  </script>
</body>
